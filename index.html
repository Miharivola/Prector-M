<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Predict Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #05080f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(234, 179, 8, 0.2);
            border-radius: 15px;
        }
        .input-field {
            background: #111827;
            border: 1px solid #374151;
            color: white;
            text-align: center;
        }
        .btn-calculate {
            background: linear-gradient(90deg, #4ade80 0%, #eab308 100%);
            color: #000;
            font-weight: 800;
        }
        .result-box {
            border: 2px solid #eab308;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 border-2 border-yellow-500 rotate-45"></div>
            <h1 class="text-yellow-500 font-bold leading-none">Blizzard-<br>Imperial</h1>
        </div>
        <div class="bg-cyan-500/20 text-cyan-400 px-4 py-1 rounded-lg border border-cyan-500/50 text-sm font-bold">
            🛡️ Admin
        </div>
    </div>

    <div class="w-full max-w-md glass-card p-6 shadow-2xl">
        <div class="flex justify-center mb-4 text-yellow-500 text-3xl">🖩</div>
        <h2 class="text-center text-xl font-bold mb-6 tracking-wide">Calculateur de Prédiction</h2>

        <div class="space-y-4">
            <div>
                <label class="text-xs text-cyan-400 block mb-1">🕒 Heure de départ</label>
                <input id="heure" type="text" class="w-full input-field p-3 rounded-lg text-lg" value="08:55:39">
            </div>

            <div>
                <label class="text-xs text-gray-400 block mb-1">Multiplicateur</label>
                <input id="mult" type="number" step="0.01" class="w-full input-field p-2 rounded-lg" value="1.87">
            </div>

            <div>
                <label class="text-xs text-gray-400 block mb-1">Décimal (max 1000)</label>
                <input id="dec" type="number" step="0.000001" class="w-full input-field p-2 rounded-lg" value="222.500992">
            </div>

            <div>
                <label class="text-xs text-gray-400 block mb-1">Constante</label>
                <input id="cons" type="number" class="w-full input-field p-2 rounded-lg" value="4294967295">
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="calculate()" class="flex-1 btn-calculate py-3 rounded-lg uppercase tracking-tighter">Calculer</button>
                <button onclick="reset()" class="flex-1 bg-black border border-gray-700 py-3 rounded-lg uppercase text-sm">Réinitialiser</button>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-center text-cyan-400 text-sm font-bold mb-4 uppercase tracking-widest">Résultat</h3>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="result-box p-3 text-center bg-black/40">
                    <p class="text-[10px] text-gray-400">PREDICTION</p>
                    <p id="res-pred" class="text-yellow-500 text-xl font-bold">--:--:--</p>
                </div>
                <div class="bg-gray-800/50 p-3 text-center rounded-lg border border-gray-700">
                    <p class="text-[10px] text-gray-400">TEMPS RAJOUTÉ</p>
                    <p id="res-plus" class="text-white text-xl font-bold">--:--:--</p>
                </div>
                <div class="bg-gray-800/50 p-3 text-center rounded-lg border border-gray-700">
                    <p class="text-[10px] text-gray-400">COTE MAX/VLV</p>
                    <p id="res-max" class="text-green-500 text-xl font-bold">0.00</p>
                </div>
                <div class="bg-gray-800/50 p-3 text-center rounded-lg border border-gray-700">
                    <p class="text-[10px] text-gray-400">COTE MOYEN</p>
                    <p id="res-moy" class="text-white text-xl font-bold">0.00</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            // Get values
            const heureInput = document.getElementById('heure').value;
            const mult = parseFloat(document.getElementById('mult').value);
            const dec = parseFloat(document.getElementById('dec').value);
            const cons = parseFloat(document.getElementById('cons').value);

            // 1. Convert Time to Seconds
            const [h, m, s] = heureInput.split(':').map(Number);
            const baseSeconds = h * 3600 + m * 60 + s;

            // 2. Logic for Added Time (Temps Rajouté)
            // Lojika: (Constante / Decimal) mod 600 ho an'ny elanelana segondra
            let addedSec = (cons % (dec * 10)) / (mult * 2.5);
            if (addedSec > 600) addedSec = addedSec % 300; // Limit to 5-10 mins

            // 3. Final Prediction
            const finalSec = baseSeconds + addedSec;
            const date = new Date(0);
            date.setSeconds(finalSec);
            const predictionStr = date.toISOString().substr(11, 8);

            // 4. Formatting Temps Rajouté (mm:ss:ms)
            const rMin = Math.floor(addedSec / 60);
            const rSeg = Math.floor(addedSec % 60);
            const rMs = Math.floor((addedSec % 1) * 100);
            const addedStr = `${rMin.toString().padStart(2,'0')}:${rSeg.toString().padStart(2,'0')}:${rMs.toString().padStart(2,'0')}`;

            // 5. Cotes
            const cMax = ((cons / (dec * 100)) % 50) + (mult * 2);
            const cMoy = (cMax / 2) + 1.5;

            // Update UI
            document.getElementById('res-pred').innerText = predictionStr;
            document.getElementById('res-plus').innerText = addedStr;
            document.getElementById('res-max').innerText = cMax.toFixed(2);
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
        }

        function reset() {
            document.getElementById('res-pred').innerText = "--:--:--";
            document.getElementById('res-plus').innerText = "--:--:--";
            document.getElementById('res-max').innerText = "0.00";
            document.getElementById('res-moy').innerText = "0.00";
        }
    </script>
</body>
</html>
