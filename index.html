<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Predict Pro - Fix 10 Digits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #05080f; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 24px; }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; text-align: center; }
        .btn-calc { background: linear-gradient(90deg, #86efac, #fde047); color: #000; font-weight: 800; }
        .result-box { border: 1px solid #1e293b; border-radius: 12px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border-2 border-yellow-500 rotate-45 flex items-center justify-center">
                    <div class="w-1 h-1 bg-yellow-500 rounded-full"></div>
                </div>
                <div class="text-yellow-500 font-bold text-sm leading-tight uppercase">Blizzard-Imperial</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-cyan-500/10 text-cyan-400 px-3 py-1 rounded-lg border border-cyan-500/30 text-[11px] font-bold">🛡️ Admin</div>
                <i data-lucide="history" class="w-5 h-5 text-gray-400"></i>
                <i data-lucide="log-out" class="w-5 h-5 text-gray-400"></i>
            </div>
        </div>

        <div class="glass-card p-6 shadow-2xl">
            <h2 class="text-center text-lg font-bold mb-6 text-white tracking-wide">Calculateur de Prédiction</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1 block">Heure de départ</label>
                    <input id="heure" type="text" class="w-full input-field p-3 rounded-xl text-xl" value="15:20:22">
                </div>

                <div class="space-y-3">
                    <input id="mult" type="number" step="0.01" class="w-full input-field p-2 rounded-lg text-sm" placeholder="Multiplicateur (ex: 125.59)">
                    <input id="dec" type="number" class="w-full input-field p-2 rounded-lg text-sm" placeholder="Décimal (max 10 digits)">
                    <input id="cons" type="number" class="w-full input-field p-2 rounded-lg text-sm" value="4294967295">
                </div>

                <div class="flex gap-3 mt-4">
                    <button onclick="calculate()" class="flex-[2] btn-calc py-4 rounded-xl uppercase text-sm active:scale-95 transition">Calculer</button>
                    <button onclick="reset()" class="flex-1 bg-black/60 border border-white/10 py-4 rounded-xl uppercase text-[10px] font-bold">Reset</button>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-2 gap-3">
                <div class="result-box p-3 text-center border-yellow-500/50 bg-yellow-500/5 col-span-2">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">PREDICTION FINAL</p>
                    <p id="res-pred" class="text-yellow-500 text-2xl font-black">--:--:--</p>
                </div>
                
                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">CÔTE BASE</p>
                    <p id="res-base" class="text-blue-400 text-xl font-bold">0.00</p>
                </div>

                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">TEMPS +</p>
                    <p id="res-plus" class="text-white text-xl font-bold">--:--</p>
                </div>

                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">COTE MOYEN</p>
                    <p id="res-moy" class="text-white text-xl font-bold">0.00</p>
                </div>

                <div class="result-box p-3 text-center border-green-500/30">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">COTE MAX</p>
                    <p id="res-max" class="text-green-400 text-xl font-bold">0.00</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function calculate() {
            const hInput = document.getElementById('heure').value;
            const mult = parseFloat(document.getElementById('mult').value) || 1;
            const decRaw = document.getElementById('dec').value;
            const cons = parseFloat(document.getElementById('cons').value) || 4294967295;

            // Fepetra: raha mihoatra ny 10 digits ny decimal dia tapahina
            const decStr = decRaw.toString().substring(0, 10);
            const dec = parseFloat(decStr) || 1;

            const parts = hInput.split(':');
            const baseSec = (parseInt(parts[0]) * 3600) + (parseInt(parts[1]) * 60) + parseInt(parts[2]);

            // Algorithm raikitra: mizara foana isika mba tsy ho be loatra ny isa
            let addedSec = (cons / (dec * 1.5)) * (mult / 100);
            addedSec = Math.abs(addedSec % 600); // Elanelana max 10 minitra

            const finalSec = baseSec + addedSec;
            const d = new Date(0); d.setSeconds(finalSec);
            const predTime = d.toISOString().substr(11, 8);

            const m = Math.floor(addedSec / 60);
            const s = Math.floor(addedSec % 60);
            const addedStr = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

            // KAJY NY COTES (Mizara ny dec foana mba ho normal ny isa)
            const baseFactor = (dec.toString().length); 
            const cBase = 1.10 + (baseFactor * 0.1);
            const cMax = 5.00 + (dec % 45) + (mult / 10);
            const cMoy = (cBase + cMax) / 2.5;

            document.getElementById('res-pred').innerText = predTime;
            document.getElementById('res-plus').innerText = addedStr;
            document.getElementById('res-base').innerText = cBase.toFixed(2);
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);
        }

        function reset() {
            document.getElementById('res-pred').innerText = "--:--:--";
            document.getElementById('res-plus').innerText = "--:--";
            document.getElementById('res-base').innerText = "0.00";
            document.getElementById('res-moy').innerText = "0.00";
            document.getElementById('res-max').innerText = "0.00";
        }
    </script>
</body>
</html>
