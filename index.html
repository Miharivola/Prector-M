<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Predictor V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(234, 179, 8, 0.3); border-radius: 24px; }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; text-align: center; }
        .btn-calc { background: linear-gradient(90deg, #fde047, #eab308); color: #000; font-weight: 900; }
        .result-box { border: 1px solid #1e293b; border-radius: 16px; background: rgba(30, 41, 59, 0.5); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 border-2 border-yellow-500 rotate-45 flex items-center justify-center">
                    <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></div>
                </div>
                <div class="text-yellow-500 font-bold text-[10px] leading-none uppercase">Blizzard-<br>Imperial</div>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-cyan-500/10 text-cyan-400 px-3 py-1.5 rounded-lg border border-cyan-500/30 text-[11px] font-bold">Admin</div>
                <button onclick="toggleHistory()" class="text-gray-400 hover:text-white"><i data-lucide="history" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div class="glass-card p-6 shadow-2xl">
            <h2 class="text-center text-lg font-bold mb-6 tracking-wide">Prediction Crystal</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1 block">N° de Tour (Farany)</label>
                    <input id="tour" type="number" class="w-full input-field p-3 rounded-xl text-xl font-mono" placeholder="8029946">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <input id="mult" type="number" step="0.01" class="w-full input-field p-2.5 rounded-lg text-sm" placeholder="Multiplicateur (ex: 8.39)">
                    <input id="dec" type="text" class="w-full input-field p-2.5 rounded-lg text-sm" placeholder="Décimal (Hash)">
                    <input id="cons" type="number" class="w-full input-field p-2.5 rounded-lg text-sm opacity-40" value="4294967295" readonly>
                </div>

                <button onclick="calculate()" class="w-full btn-calc py-4 rounded-xl uppercase text-sm tracking-widest active:scale-95 transition mt-4 shadow-lg shadow-yellow-500/10">Calculer</button>
            </div>

            <div class="mt-8 space-y-3">
                <div class="result-box p-4 text-center border-yellow-500/30 bg-yellow-500/5">
                    <p class="text-[10px] text-gray-500 font-bold mb-1 uppercase">Prochain Tour Vinavinaina</p>
                    <p id="res-tour" class="text-yellow-500 text-3xl font-black">-------</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="result-box p-4 text-center">
                        <p class="text-[9px] text-gray-400 font-bold mb-1 uppercase">Côte Moyen</p>
                        <p id="res-moy" class="text-white text-xl font-black">0.00</p>
                    </div>
                    <div class="result-box p-4 text-center border-green-500/20 bg-green-500/5">
                        <p class="text-[9px] text-gray-400 font-bold mb-1 uppercase">Côte Max</p>
                        <p id="res-max" class="text-green-400 text-xl font-black">0.00</p>
                    </div>
                </div>
            </div>

            <div id="history-panel" class="hidden mt-4 p-3 bg-black/40 border border-gray-800 rounded-xl text-[10px] font-mono">
                <p class="text-cyan-400 mb-2 border-b border-gray-800 pb-1">HISTORY</p>
                <div id="history-list" class="space-y-1 text-gray-400"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let history = [];

        function calculate() {
            const tourInput = document.getElementById('tour').value;
            const mult = parseFloat(document.getElementById('mult').value) || 1.1;
            const dec = document.getElementById('dec').value || "100";
            
            if (!tourInput) return alert("Ampidiro ny tour!");

            // 1. Logic ho an'ny Next Tour (mifanaraka amin'ny filaharana)
            const nextTour = parseInt(tourInput) + 1;

            // 2. Logic ho an'ny Côte (Fampiasana ampahany amin'ny decimal mba ho marina kokoa)
            // Maka ny isa 3 farany amin'ny decimal
            const lastThree = parseInt(dec.toString().slice(-3)) || 123;
            
            // Fikajiana ny Côte Moyen (eo anelanelan'ny 1.50 sy 3.50 matetika)
            let cMoy = 1.40 + (lastThree / 400) + (mult * 0.1);
            
            // Fikajiana ny Côte Max (vinavina miankina amin'ny constant)
            let cMax = (lastThree / 50) + (mult * 1.5);

            // Fisorohana ny valiny diso (Limiters)
            if (cMoy < 1.2) cMoy = 1.50 + (mult * 0.05);
            if (cMax < 3) cMax = 5.25 + (lastThree / 100);

            // Display
            document.getElementById('res-tour').innerText = nextTour;
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);

            // History
            history.unshift(`T${nextTour}: Moy ${cMoy.toFixed(2)} | Max ${cMax.toFixed(2)}`);
            updateHistoryUI();
        }

        function toggleHistory() { document.getElementById('history-panel').classList.toggle('hidden'); }
        function updateHistoryUI() {
            document.getElementById('history-list').innerHTML = history.slice(0, 5).map(h => `• ${h}`).join('<br>');
        }
    </script>
</body>
</html>
