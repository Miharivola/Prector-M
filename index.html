<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor VIP</title>
    <style>
        /* Stylisme tahaka ny sary nalefanao */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container { width: 90%; max-width: 360px; text-align: center; }

        /* Fizarana Pejy */
        .page { display: none; animation: fadeIn 0.5s; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Style Menu (Sary 1 & 3) */
        .title-gold {
            color: #FFD700;
            font-size: 26px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
        }

        .btn-menu {
            background: linear-gradient(180deg, #FFD700 0%, #8A6D3B 100%);
            border: 1px solid #444;
            border-radius: 12px;
            color: #000;
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Style Predictor (Sary 2 & 5) */
        .card-vip {
            border: 3px solid #FFD700;
            border-radius: 20px;
            padding: 30px 15px;
            background: #0a0a0a;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .big-num {
            font-size: 60px;
            color: #FFD700;
            font-weight: 900;
            margin: 20px 0;
        }

        .btn-predict {
            background: #FFD700;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .footer-link { color: #555; font-size: 12px; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="p1" class="page active">
            <div class="title-gold">💛 LAST PREDICTOR 💛</div>
            <p style="color: #888; font-size: 13px; margin-bottom: 30px;">Choisissez votre jeu de prédiction</p>
            
            <button class="btn-menu" onclick="goTo('p2', 'AVIATOR')">🚀 AVIATOR</button>
            <button class="btn-menu" onclick="goTo('p2', 'JETX')">🚀 JETX</button>
            <button class="btn-menu" onclick="goTo('p2', 'COSMOSX')">🚀 COSMOSX</button>
        </div>

        <div id="p2" class="page">
            <div class="title-gold" id="gt">PREDICTION</div>
            
            <div class="card-vip">
                <div style="font-size: 12px; color: #aaa;">PROCHAIN SIGNAL À :</div>
                <div id="res" class="big-num">--.--X</div>
                <button class="btn-predict" onclick="spin()">PREDICTOR 💛</button>
            </div>
            
            <div class="footer-link" onclick="goTo('p1')">← Retour au menu</div>
        </div>

    </div>

    <script>
        // Ity script ity no manova pejy nefa tsy mivoaka ny index.html
        function goTo(id, name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(name) document.getElementById('gt').innerText = "PREDICTION " + name;
        }

        function spin() {
            const r = document.getElementById('res');
            r.innerText = "Wait...";
            setTimeout(() => {
                r.innerText = (Math.random() * 8 + 1.1).toFixed(2) + "X";
            }, 600);
        }
    </script>
</body>
</html>
