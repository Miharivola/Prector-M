<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Predictor VIP - Advanced Algorithm</title>
    <style>
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        #floating-clock {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #f1c40f;
            padding: 5px 15px;
            border-radius: 50px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #111;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            position: relative;
            overflow: hidden;
        }

        .bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            opacity: 0.08;
            z-index: 0;
        }

        .page { position: relative; z-index: 1; display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-logo {
            width: 70px;
            margin-bottom: 10px;
            animation: pulseLogo 3s infinite;
        }

        @keyframes pulseLogo {
            0% { filter: drop-shadow(0 0 2px #f1c40f); transform: scale(1); }
            50% { filter: drop-shadow(0 0 10px #f1c40f); transform: scale(1.05); }
            100% { filter: drop-shadow(0 0 2px #f1c40f); transform: scale(1); }
        }

        h1 { font-size: 20px; color: #f1c40f; letter-spacing: 1px; }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            background: linear-gradient(145deg, #f1c40f, #b8860b);
            color: #000;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            margin-top: 5px;
        }

        .result-card {
            background: rgba(0,0,0,0.8);
            padding: 25px 20px;
            border: 1px solid #f1c40f;
            border-radius: 20px;
            margin-top: 20px;
        }

        .timer-val { font-size: 45px; font-weight: 900; color: #fff; margin-bottom: 15px; letter-spacing: 2px; }
        .row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 14px; }
        .val-gold { color: #f1c40f; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="floating-clock">00:00:00</div>

    <div class="container">

        <div id="page1" class="page active">
            <img src="https://i.ibb.co/L6V6RzS/lion-logo.png" class="top-logo">
            <h1>👑 VIP ALGORITHM 👑</h1>
            <p style="font-size: 10px; color: #666;">SERVER SEED DECODER V4.2</p>
            <button class="btn" onclick="showPage('page2', 'AVIATOR')">🚀 AVIATOR</button>
            <button class="btn" onclick="showPage('page2', 'JETX')">🚀 JETX</button>
            <button class="btn" onclick="showPage('page2', 'COSMOSX')">🚀 COSMOSX</button>
        </div>

        <div id="page2" class="page">
            <h1 id="game-name">PRÉDICTION</h1>
            <div style="text-align:left; margin-bottom:15px;">
                <label style="font-size:10px; color:#f1c40f;">HEURE ACTUELLE</label>
                <input type="text" id="input-time">
            </div>
            <div style="text-align:left; margin-bottom:15px;">
                <label style="font-size:10px; color:#f1c40f;">GRAINE SERVEUR (HASH)</label>
                <input type="text" id="input-seed" placeholder="Ex: e4b2c1">
