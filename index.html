<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor VIP</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 92%; max-width: 400px; text-align: center; }
        .page { display: none; }
        .active { display: block; }

        /* Loko volamena */
        .gold { color: #d4af37; }
        .btn-gold { 
            background: linear-gradient(180deg, #d4af37, #8a6d3b); 
            border: none; border-radius: 12px; color: #000; 
            width: 100%; padding: 18px; margin: 10px 0; 
            font-weight: bold; font-size: 18px; cursor: pointer;
        }

        /* Vata amboniny (Input) */
        .input-card { background: #151515; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .clock-display { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .seed-box { background: #222; padding: 12px; border-radius: 8px; color: #d4af37; font-size: 20px; letter-spacing: 2px; }

        /* Vata ambany (Resultat - Miafina aloha) */
        #result-area { 
            display: none; /* Miafina */
            border: 2px solid #d4af37; border-radius: 20px; padding: 20px; 
            background: rgba(20, 20, 20, 0.9); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .val-row { font-size: 18px; font-weight: bold; margin: 12px 0; }
        .base { color: #fff; } .secu { color: #4cd137; } .risk { color: #a55eea; }

        .back { color: #555; font-size: 12px; margin-top: 30px; cursor: pointer; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="page-menu" class="page active">
            <h2 class="gold">💛 LAST PREDICTOR 💛</h2>
            <button class="btn-gold" onclick="openPredictor('AVIATOR')">🚀 AVIATOR</button>
            <button class="btn-gold" onclick="openPredictor('JETX')">🚀 JETX</button>
            <button class="btn-gold" onclick="openPredictor('COSMOSX')">🚀 COSMOSX</button>
        </div>

        <div id="page-predict" class="page">
            <div class="input-card">
                <div id="live-clock" class="clock-display">00:00:00</div>
                
                <div style="font-size: 11px; color: #888; margin-top: 10px;">Graine de serveur</div>
                <div id="seed-val" class="seed-box">403245</div>
                
                <button class="btn-gold" style="margin-top: 15px;" onclick="doPredict()">🚀 PREDICTOR 🖤</button>
            </div>

            <div id="result-area">
                <div style="color: #4cd137; font-size: 13px; margin-bottom: 10px;">■ PRÉDICTION <span id="game-name"></span></div>
                <div id="predict-time" style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">--:--:--</div>
                
                <div class="val-row base">🤍 BASE : <span id="v1">x0.00</span></div>
                <div class="val-row secu">💚 SÉCURITÉ : <span id="v2">x0.00</span></div>
                <div class="val-row risk">💜 RISQUE : <span id="v3">x0.00</span></div>
            </div>

            <a href="#" class="back" onclick="location.reload()">← Retour au menu</a>
        </div>
    </div>

    <script>
        // Mampiseho ny lera mandeha
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        }, 1000);

        function openPredictor(name) {
            document.getElementById('page-menu').classList.remove('active');
            document.getElementById('page-predict').classList.add('active');
            document.getElementById('game-name').innerText = name;
        }

        function doPredict() {
            // Mampipoitra ilay vata valiny
            document.getElementById('result-area').style.display = 'block';

            // Maka lera ho an'ilay prediction (jera miampy 5 mn ohatra)
            const d = new Date();
            d.setMinutes(d.getMinutes() + 5);
            document.getElementById('predict-time').innerText = d.toLocaleTimeString();

            // Manova ny Seed
            document.getElementById('seed-val').innerText = Math.floor(100000 + Math.random() * 900000);

            // Manova ny isa Base, Secu, Risk
            document.getElementById('v1').innerText = "x" + (Math.random() * 2 + 1.2).toFixed(2);
            document.getElementById('v2').innerText = "x" + (Math.random() * 7 + 5).toFixed(2);
            document.getElementById('v3').innerText = "x" + (Math.random() * 35 + 20).toFixed(2);
        }
    </script>
</body>
</html>
