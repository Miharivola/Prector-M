<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Crystal V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(234, 179, 8, 0.4); border-radius: 28px; box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; text-align: center; transition: 0.3s; }
        .input-field:focus { border-color: #eab308; box-shadow: 0 0 10px rgba(234, 179, 8, 0.2); outline: none; }
        .btn-calc { background: linear-gradient(90deg, #fde047, #eab308); color: #000; font-weight: 900; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3); }
        .result-box { border: 1px solid #1e293b; border-radius: 18px; background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 border-2 border-yellow-500 rotate-45 flex items-center justify-center">
                    <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></div>
                </div>
                <div class="text-yellow-500 font-black text-[10px] leading-none uppercase tracking-tighter">Blizzard-<br>Imperial</div>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-cyan-500/10 text-cyan-400 px-3 py-1.5 rounded-lg border border-cyan-500/30 text-[11px] font-bold">PRO ADMIN</div>
                <button onclick="toggleHistory()" class="text-gray-400 hover:text-white transition"><i data-lucide="history" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div class="glass-card p-6">
            <h2 class="text-center text-lg font-bold mb-6 tracking-widest text-white/90">ALGORITHM CRYSTAL V7</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1 ml-1 block">N° de Tour (Farany)</label>
                    <input id="tour" type="number" class="w-full input-field p-4 rounded-2xl text-2xl font-mono" placeholder="8029946">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <input id="mult" type="number" step="0.01" class="w-full input-field p-3 rounded-xl text-sm" placeholder="Multiplicateur Farany">
                    <input id="dec" type="text" class="w-full input-field p-3 rounded-xl text-sm" placeholder="Décimal (Laharana Hash)">
                    <div class="relative">
                        <label class="absolute -top-2 left-3 bg-[#0f172a] px-1 text-[8px] text-gray-500 font-bold uppercase">System Constante</label>
                        <input id="cons" type="number" class="w-full input-field p-3 rounded-xl text-sm font-bold text-yellow-500/80" value="4294967295" readonly>
                    </div>
                </div>

                <button onclick="calculate()" class="w-full btn-calc py-4 rounded-2xl uppercase text-sm tracking-[0.2em] active:scale-95 transition mt-4">Calculer Prediction</button>
            </div>

            <div class="mt-8 space-y-4">
                <div class="result-box p-5 text-center border-yellow-500/40 bg-yellow-500/5 ring-1 ring-yellow-500/10">
                    <p class="text-[10px] text-gray-500 font-black mb-1 uppercase tracking-[0.2em]">Target Tour Prediction</p>
                    <p id="res-tour" class="text-yellow-500 text-4xl font-black drop-shadow-[0_0_10px_rgba(234,179,8,0.4)]">-------</p>
                    <p id="res-gap" class="text-[9px] text-cyan-500 mt-2 font-bold uppercase tracking-widest"></p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="result-box p-4 text-center border-white/5">
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Côte Moyen</p>
                        <p id="res-moy" class="text-white text-2xl font-black italic">0.00</p>
                    </div>
                    <div class="result-box p-4 text-center border-green-500/30 bg-green-500/5">
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase text-green-500/70">Côte Max</p>
                        <p id="res-max" class="text-green-400 text-2xl font-black italic">0.00</p>
                    </div>
                </div>
            </div>

            <div id="history-panel" class="hidden mt-6 p-4 bg-black/50 border border-gray-800 rounded-2xl text-[10px] font-mono">
                <p class="text-cyan-400 mb-2 border-b border-gray-800 pb-1 font-black">LOGS HISTORIQUE</p>
                <div id="history-list" class="space-y-1 text-gray-400"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let logs = [];

        function calculate() {
            const tIn = document.getElementById('tour').value;
            const mult = parseFloat(document.getElementById('mult').value) || 1.00;
            const decStr = document.getElementById('dec').value || "0";
            const cons = 4294967295;

            if (!tIn) return alert("Ampidiro ny laharan'ny tour!");

            // --- ALGORITHM CRYSTAL V7 (SHA-256 SIMULATION) ---
            // 1. Mampiasa ny "Sum of digits" amin'ny decimal mba hahazoana seed mavitrika
            let decDigits = decStr.split('').reduce((a, b) => a + (parseInt(b) || 0), 0);
            
            // 2. Kajy ny Jump (3 na 4) miankina amin'ny modulo an'ilay decimal
            // Mampiasa ny constant ho sivana (filter)
            let jumpSeed = (parseInt(decStr.slice(-2)) || decDigits);
            let jump = (jumpSeed % 2 === 0) ? 3 : 4; 
            const targetT = parseInt(tIn) + jump;

            // 3. Kajy ny Côte (Mampiasa ny sisa amin'ny fizarana ny Constante)
            // Ity no tena lojikan'ny lalao: ny constant zaraina amin'ny ampahany amin'ny decimal
            let coreSeed = parseInt(decStr.slice(-5)) || 54321;
            let rawValue = (cons / (coreSeed + 1)) * (mult / 1.5);
            
            // Fandrindrana ny Côte Moyen (eo amin'ny 1.90 - 4.50)
            let cMoy = 1.85 + (rawValue % 2.5);
            
            // Fandrindrana ny Côte Max (mety hahatratra 15.00+)
            let cMax = (cMoy * 2.1) + (decDigits % 12);

            // Fanamarinana farany (Security Limiters)
            if (cMoy < 1.5) cMoy = 2.05 + (mult * 0.1);
            if (cMax < 4) cMax = 7.82 + (decDigits / 5);

            // UI Display
            document.getElementById('res-tour').innerText = targetT;
            document.getElementById('res-gap').innerText = `+${jump} TOURS ELANELANA`;
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);

            // Log Update
            logs.unshift(`T${targetT} | M:${cMoy.toFixed(2)} | X:${cMax.toFixed(2)}`);
            const list = document.getElementById('history-list');
            list.innerHTML = logs.slice(0, 5).map(l => `<div>> ${l}</div>`).join('');
        }

        function toggleHistory() { document.getElementById('history-panel').classList.toggle('hidden'); }
    </script>
</body>
</html>
