<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Crystal V9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(234, 179, 8, 0.4); border-radius: 28px; }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; text-align: center; }
        .btn-calc { background: linear-gradient(90deg, #fde68a, #f59e0b); color: #000; font-weight: 900; }
        .result-box { border: 1px solid #1e293b; border-radius: 20px; background: rgba(30, 41, 59, 0.7); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="glass-card p-6 border-t-4 border-t-yellow-500 shadow-2xl">
            <h2 class="text-center text-xs font-black mb-6 tracking-[0.3em] text-yellow-500 uppercase">Algorithm Provably Sync V9</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1 block">N° de Tour (Farany vita)</label>
                    <input id="tour" type="number" class="w-full input-field p-4 rounded-2xl text-2xl font-mono text-white" placeholder="Ohatra: 8032782">
                </div>

                <div class="space-y-3">
                    <input id="dec" type="text" class="w-full input-field p-3 rounded-xl text-sm font-mono border-cyan-500/20" placeholder="Decimal farany (Hash)">
                    <input id="cons" type="number" class="w-full input-field p-3 rounded-xl text-sm font-bold text-gray-500" value="4294967295" readonly>
                </div>

                <button onclick="calculate()" class="w-full btn-calc py-5 rounded-2xl uppercase text-sm active:scale-95 transition mt-2 shadow-lg shadow-yellow-500/20">
                    SYNC & PREDICT
                </button>
            </div>

            <div class="mt-8 space-y-4">
                <div class="result-box p-6 text-center border-yellow-500/30 bg-yellow-500/5">
                    <p class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-widest">Next Target Tour</p>
                    <p id="res-tour" class="text-yellow-500 text-4xl font-black italic">-------</p>
                    <p id="res-gap" class="text-[9px] text-cyan-400 mt-2 font-bold"></p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="result-box p-4 text-center">
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Côte Moyen</p>
                        <p id="res-moy" class="text-white text-2xl font-black">0.00</p>
                    </div>
                    <div class="result-box p-4 text-center border-green-500/30">
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Côte Max</p>
                        <p id="res-max" class="text-green-400 text-2xl font-black">0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const tIn = document.getElementById('tour').value;
            const decStr = document.getElementById('dec').value;
            const cons = 4294967295;

            if (!tIn || !decStr) return alert("Ampidiro ny Tour sy ny Decimal!");

            // 1. KAJY JUMP (MIANIKINA AMIN'NY HASH)
            // Raha lehibe ny Decimal dia midika fa lavitra ny elanelana
            let hashSeed = parseInt(decStr.substring(0, 5)) || 12345;
            let jump = 4 + (hashSeed % 6); // Elanelana 4 ka hatramin'ny 9
            const targetT = parseInt(tIn) + jump;

            // 2. KAJY COTE (PROVABLY LOGIC)
            let core = (cons / (parseInt(decStr.slice(-6)) + 1));
            let cMoy = 1.80 + (core % 2.5);
            let cMax = (cMoy * 2.3) + (hashSeed % 10);

            // UI UPDATE
            document.getElementById('res-tour').innerText = targetT;
            document.getElementById('res-gap').innerText = `ELANELANA +${jump} (Sync amin'ny Hash)`;
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);
        }
    </script>
</body>
</html>
