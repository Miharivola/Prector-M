<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Predictor VIP 3D</title>
    <style>
        /* --- LERA MITSINGEVANA --- */
        #floating-clock {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #f1c40f;
            padding: 6px 15px;
            border-radius: 50px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        /* --- BACKGROUND MIHETSIKA --- */
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px; /* Ho an'ny 3D */
        }

        /* --- CONTAINER 3D --- */
        .container {
            width: 90%;
            max-width: 360px;
            background: #111;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            transform: rotateX(5deg); /* Angle hafa */
            transition: 0.5s;
            position: relative;
        }

        .page { display: none; animation: slideIn 0.5s ease-out; }
        .active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: rotateY(-20deg) scale(0.9); }
            to { opacity: 1; transform: rotateY(0) scale(1); }
        }

        /* --- BOKOTRA MISY GLOW --- */
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 16px;
            background: linear-gradient(135deg, #f1c40f, #d4af37);
            color: #000;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.7); }
            100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.4); }
        }

        /* --- VOKATRA MISY LION ZOOM --- */
        .result-card {
            background: #000;
            position: relative;
            padding: 25px;
            border: 2px solid #f1c40f;
            border-radius: 20px;
            overflow: hidden;
        }

        .lion-bg {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: url('https://i.ibb.co/L6V6RzS/lion-logo.png') no-repeat center;
            background-size: 60%;
            opacity: 0.2;
            animation: lionMove 10s infinite alternate;
            z-index: 0;
        }

        @keyframes lionMove {
            from { transform: scale(1); }
            to { transform: scale(1.3); }
        }

        .content-res { position: relative; z-index: 1; }

        .timer-val { font-size: 45px; font-weight: 900; color: #fff; margin-bottom: 20px; }
        .val-gold { color: #f1c40f; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(241,196,15,0.5); }
    </style>
</head>
<body>

    <div id="floating-clock">00:00:00</div>

    <div id="page1" class="container page active">
        <h1 style="color:#f1c40f; font-size: 24px;">👑 VIP PREDICTOR 👑</h1>
        <p style="color:#666; font-size:11px;">SYSTÈME D'ALGORITHME AVANCÉ</p>
        <button class="btn" onclick="showPage('page2', 'AVIATOR')">🚀 AVIATOR</button>
        <button class="btn" onclick="showPage('page2', 'JETX')">🚀 JETX</button>
        <button class="btn" onclick="showPage('page2', 'COSMOSX')">🚀 COSMOSX</button>
    </div>

    <div id="page2" class="container page">
        <h1 id="game-name" style="color:#f1c40f;">PRÉDICTION</h1>
        <div style="text-align:left; margin-bottom:20px;">
            <label style="font-size:10px; color:#d4af37;">HEURE ACTUELLE</label>
            <input type="text" id="input-time" style="width:100%; padding:15px; background:#222; border:1px solid #444; color:#fff; border-radius:10px; text-align:center;">
        </div>
        <button class="btn" id="btn-calc" onclick="startCalculating()">🔥 ANALYSER MAINTENANT</button>
        <div id="loader" style="display:none; color:#fff; font-size:12px; margin:20px 0;">CHARGEMENT DU SERVEUR...</div>
        <p style="color:#444; cursor:pointer;" onclick="showPage('page1')">← ANNULLER</p>
    </div>

    <div id="page3" class="container page">
        <div class="result-card">
            <div class="lion-bg"></div>
            <div class="content-res">
                <div style="color:#2ecc71; font-size:10px; margin-bottom:10px;">✔ ANALYSE TERMINÉE</div>
                <div class="timer-val" id="res-time">00:00:00</div>
                <div style="display:flex; justify-content:space-between; margin:15px 0;">
                    <span>OBJECTIF :</span>
                    <span class="val-gold" id="val-base">x0.00</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin:15px 0; border-top:1px solid #222; padding-top:10px;">
                    <span style="color:#ff4757;">MAX RISQUE :</span>
                    <span style="color:#ff4757; font-size:24px; font-weight:bold;" id="val-risque">x0.00</span>
                </div>
            </div>
        </div>
        <button class="btn" style="margin-top:20px;" onclick="showPage('page2')">REFAIRE L'ANALYSE</button>
    </div>

    <script>
        function updateClock() {
            let now = new Date();
            document.getElementById('floating-clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showPage(pageId, title = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) document.getElementById('game-name').innerText = title;
        }

        function startCalculating() {
            const timeVal = document.getElementById('input-time').value;
            document.getElementById('btn-calc').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                let parts = timeVal.split(':');
                let d = new Date();
                d.setHours(parts[0], parts[1], parts[2]);
                d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 3) + 1);
                
                document.getElementById('res-time').innerText = d.toTimeString().split(' ')[0];
                document.getElementById('val-base').innerText = 'x' + (Math.random() * 5 + 1.5).toFixed(2);
                document.getElementById('val-risque').innerText = 'x' + (Math.random() * 40 + 10).toFixed(2);
                
                document.getElementById('btn-calc').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                showPage('page3');
            }, 2500);
        }

        window.onload = function() {
            document.getElementById('input-time').value = new Date().toTimeString().split(' ')[0];
        };
    </script>
</body>
</html>
