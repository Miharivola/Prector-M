<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE SYNC V17</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; text-transform: uppercase; }
        
        #header { width: 100%; background: #000; border-bottom: 3px solid var(--neon); padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 25px rgba(0, 255, 65, 0.4); }
        #clock { font-size: 48px; font-weight: 900; color: var(--neon); font-family: 'Courier New', monospace; letter-spacing: -2px; }

        .wrapper { width: 92%; max-width: 400px; margin-top: 25px; }
        .main-card { background: #0a0a0a; border-radius: 35px; border: 1px solid #1a1a1a; padding: 30px; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.9); position: relative; }
        
        .progress-bar { width: 0%; height: 6px; background: linear-gradient(90deg, transparent, var(--neon)); position: absolute; top: 0; left: 0; border-radius: 35px 35px 0 0; transition: 0.1s; box-shadow: 0 0 15px var(--neon); }

        .page { display: none; }
        .active { display: block; }

        h1 { color: var(--gold); font-size: 24px; letter-spacing: 5px; margin-bottom: 25px; font-weight: 900; }
        .btn { width: 100%; padding: 20px; margin: 12px 0; background: linear-gradient(135deg, var(--gold), #b8860b); border: none; border-radius: 18px; font-weight: 900; font-size: 16px; color: #000; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-cosmos { background: linear-gradient(135deg, #a020f0, #6a0dad); color: white; }
        .btn:active { transform: scale(0.95); }
        
        .input-box { text-align: left; margin-bottom: 18px; }
        label { font-size: 10px; color: #666; font-weight: bold; padding-left: 8px; }
        input { width: 100%; padding: 18px; background: #000; border: 1px solid #333; color: #fff; border-radius: 15px; text-align: center; font-size: 22px; box-sizing: border-box; outline: none; margin-top: 5px; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }

        .res-display { background: #000; border: 3px solid var(--neon); border-radius: 25px; padding: 35px 15px; margin: 25px 0; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px rgba(0,255,65,0.2); } 50% { box-shadow: 0 0 30px rgba(0,255,65,0.4); } 100% { box-shadow: 0 0 10px rgba(0,255,65,0.2); } }
        .res-time { font-size: 55px; font-weight: 950; color: #fff; letter-spacing: 2px; }
        
        .stat-grid { display: flex; justify-content: space-around; border-top: 1px solid #1a1a1a; margin-top: 20px; padding-top: 20px; }
        .stat-val { font-size: 26px; font-weight: 900; color: var(--gold); }

        .history { width: 100%; margin-top: 35px; margin-bottom: 50px; }
        .hist-item { background: #080808; padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-left: 6px solid var(--neon); font-family: monospace; }
    </style>
</head>
<body>

    <div id="header"><div id="clock">00:00:00</div></div>

    <div class="wrapper">
        <div class="main-card">
            <div id="loader" class="progress-bar"></div>

            <div id="p1" class="page active">
                <div style="font-size:70px; margin-bottom:15px;">💎</div>
                <h1>ULTIMATE SYNC</h1>
                <button class="btn" onclick="go(2, '🚀 AVIATOR')">🚀 AVIATOR</button>
                <button class="btn btn-cosmos" onclick="go(2, '🌌 COSMOSX')">🌌 COSMOSX</button>
                <p style="font-size:10px; color:#222; margin-top:20px;">V17 - ELITE VERSION</p>
            </div>

            <div id="p2" class="page">
                <h2 id="title" style="color:var(--neon); margin:0;">SYNC DATA</h2>
                <div class="input-box">
                    <label>LERA HISTORY (H:M:S)</label>
                    <input type="text" id="time-in">
                </div>
                <div class="input-box">
                    <label>HEX SEED (Sary faha-3 na faha-4)</label>
                    <input type="text" id="seed-in" placeholder="Ex: 5c72c2">
                </div>
                <button class="btn" id="calc-btn" onclick="startSyncAnalyse()">🔥 SYNC & ANALYSE</button>
                <div id="status" style="display:none; color:var(--neon); font-size:12px; font-weight:bold; margin-top:10px;">DECRYPTING HEX DATA...</div>
                <p onclick="go(1)" style="font-size:11px; color:#444; cursor:pointer; margin-top:20px;">← MENU</p>
            </div>

            <div id="p3" class="page">
                <div style="color:var(--neon); font-size:12px; font-weight:bold;">✔ SIGNAL SYNCHRONISÉ</div>
                <div class="res-display">
                    <div class="res-time" id="res-t">00:00:00</div>
                    <div class="stat-grid">
                        <div><small style="color:#555;">CIBLE</small><br><span class="stat-val" id="v-base">x0.00</span></div>
                        <div><small style="color:#555;">SÉCU</small><br><span class="stat-val" style="color:#fff;" id="v-secu">x0.00</span></div>
                    </div>
                </div>
                <button class="btn" onclick="go(2)">NOUVEAU SCAN</button>
            </div>
        </div>

        <div class="history">
            <div style="font-size:11px; color:#444; border-bottom:1px solid #222; padding-bottom:10px; margin-bottom:15px;">📜 LOGS PRÉCIS</div>
            <div id="hist-list"></div>
        </div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }
        setInterval(updateClock, 1000);

        function go(n, t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
            if(t) document.getElementById('title').innerText = t;
            document.getElementById('loader').style.width = '0%';
        }

        function startSyncAnalyse() {
            const btn = document.getElementById('calc-btn');
            const status = document.getElementById('status');
            const loader = document.getElementById('loader');
            btn.style.display = 'none';
            status.style.display = 'block';
            let p = 0;
            const iv = setInterval(() => {
                p += Math.random() * 20;
                loader.style.width = p + "%";
                if(p >= 100) { clearInterval(iv); setTimeout(syncLogic, 300); }
            }, 100);
        }

        function syncLogic() {
            const seed = document.getElementById('seed-in').value || "5c72c2";
            const timeVal = document.getElementById('time-in').value;
            let seedSum = 0;
            for(let i=0; i<seed.length; i++) seedSum += seed.charCodeAt(i) * (i + 13);
            
            let t = timeVal.split(':');
            let d = new Date();
            d.setHours(t[0], t[1], t[2]);
            
            // --- ULTRA SYNC OFFSET ---
            // Natao mba ho tena akaiky ny fipoahan'ny cote
            let shiftMin = (seedSum % 5) + 2; 
            let shiftSec = (seedSum * 19) % 60;
            d.setMinutes(d.getMinutes() + shiftMin);
            d.setSeconds(shiftSec);

            const fTime = d.toTimeString().split(' ')[0];
            const baseMultiplier = 1.85 + (Math.abs(Math.cos(seedSum)) * 2.5);
            const fCote = 'x' + baseMultiplier.toFixed(2);

            document.getElementById('res-t').innerText = fTime;
            document.getElementById('v-base').innerText = fCote;
            document.getElementById('v-secu').innerText = 'x' + (baseMultiplier * 0.7).toFixed(2);

            const hList = document.getElementById('hist-list');
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<span style="font-size:20px;">🕒 ${fTime}</span><span style="color:var(--gold); font-weight:950; font-size:20px;">${fCote}</span>`;
            hList.prepend(item);

            document.getElementById('calc-btn').style.display = 'block';
            document.getElementById('status').style.display = 'none';
            go(3);
        }

        window.onload = () => {
            document.getElementById('time-in').value = new Date().toTimeString().split(' ')[0];
            updateClock();
        };
    </script>
</body>
</html>
