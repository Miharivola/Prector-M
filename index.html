<div id="result-area">
    <div style="color: #4cd137; font-size: 13px; margin-bottom: 10px;">■ PRÉDICTION <span id="game-name"></span></div>
    <div id="predict-time" style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">--:--:--</div>
    
    <div class="val-row base">🤍 BASE : <span id="v1">x0.00</span></div>
    <div class="val-row secu">💚 SÉCURITÉ : <span id="v2">x0.00</span></div>
    <div class="val-row risk">💜 RISQUE : <span id="v3">x0.00</span></div>

    <div id="status-box" style="margin-top: 20px; padding: 10px; border-radius: 10px; font-weight: bold; text-transform: uppercase;">
        <span id="status-text">--</span>
    </div>
</div>

<script>
    // ... (tohizo amin'ilay fonction doPredict teo aloha)

    function doPredict() {
        document.getElementById('result-area').style.display = 'block';
        
        // Fikajiana isa (Random)
        const baseVal = (Math.random() * 2 + 1.2).toFixed(2);
        const secuVal = (Math.random() * 7 + 5).toFixed(2);
        const riskVal = (Math.random() * 35 + 20).toFixed(2);

        document.getElementById('v1').innerText = "x" + baseVal;
        document.getElementById('v2').innerText = "x" + secuVal;
        document.getElementById('v3').innerText = "x" + riskVal;

        // Logic ho an'ny "Tournée" (Tahaka ny hita amin'ny sary 9)
        const statusBox = document.getElementById('status-box');
        const statusText = document.getElementById('status-text');

        if (parseFloat(baseVal) > 2.0) {
            statusBox.style.backgroundColor = "rgba(76, 209, 55, 0.2)";
            statusBox.style.color = "#4cd137";
            statusText.innerText = "💚 TOUR HO TSARA"; 
        } else {
            statusBox.style.backgroundColor = "rgba(232, 65, 24, 0.2)";
            statusBox.style.color = "#e84118";
            statusText.innerText = "❤️ TOUR HO RATSY";
        }

        // Fanovana lera sy seed (mitovy amin'ny teo aloha)
        const d = new Date();
        d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 5) + 1);
        document.getElementById('predict-time').innerText = d.toLocaleTimeString();
        document.getElementById('seed-val').innerText = Math.floor(100000 + Math.random() * 900000);
    }
</script>
