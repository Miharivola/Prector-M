<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Admin - Analyse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { background-color: #121212; border: 1px solid #222; }
        input { background-color: #1f1f1f; border: 1px solid #333; color: white; padding: 8px; border-radius: 8px; width: 100%; font-size: 14px; }
        input:focus { border-color: #f97316; outline: none; }
        .active-tab { border: 2px solid #f97316 !important; color: white !important; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div id="app" class="w-full max-w-md">
        
        <div class="card p-4 rounded-2xl mb-6 border-dashed border-orange-500/50">
            <h3 class="text-orange-500 text-xs font-bold mb-4 uppercase text-center">⚙️ Ampidiro ny vaovao</h3>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="text-[10px] text-gray-400">ÉQUIPE 1</label>
                    <input type="text" id="input-t1" placeholder="Manchester red" oninput="updatePreview()">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400">ÉQUIPE 2</label>
                    <input type="text" id="input-t2" placeholder="West Ham" oninput="updatePreview()">
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="text-[10px] text-gray-400 text-center block">Côte V1</label>
                    <input type="number" id="input-v1" placeholder="1.63" step="0.01" oninput="updatePreview()">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 text-center block">Côte X</label>
                    <input type="number" id="input-x" placeholder="4.08" step="0.01" oninput="updatePreview()">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 text-center block">Côte V2</label>
                    <input type="number" id="input-v2" placeholder="4.98" step="0.01" oninput="updatePreview()">
                </div>
            </div>
        </div>

        <div id="screen-football" class="flex flex-col items-center">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></div>
                <h1 class="text-green-500 text-xl font-bold uppercase tracking-widest">Football</h1>
                <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></div>
            </div>
            
            <div class="flex overflow-x-auto w-full gap-2 mb-6 no-scrollbar pb-2">
                <button onclick="selectType('STANDARD 🎲', this)" class="type-btn min-w-[100px] bg-zinc-900 p-3 rounded-xl text-[10px] border border-zinc-800">Standard 🎲</button>
                <button onclick="selectType('SCORE EXACTE 🏆', this)" class="type-btn active-tab min-w-[100px] bg-zinc-900 p-3 rounded-xl text-[10px] border border-zinc-800">Score Exacte 🏆</button>
                <button onclick="selectType('SCORE 1er MT 🟩', this)" class="type-btn min-w-[100px] bg-zinc-900 p-3 rounded-xl text-[10px] border border-zinc-800">Score 1er MT 🟩</button>
                <button onclick="selectType('MT / FT ⏱️', this)" class="type-btn min-w-[100px] bg-zinc-900 p-3 rounded-xl text-[10px] border border-zinc-800">MT / FT ⏱️</button>
                <button onclick="selectType('TOTAL BUTS ⚽', this)" class="type-btn min-w-[100px] bg-zinc-900 p-3 rounded-xl text-[10px] border border-zinc-800">Total Buts ⚽</button>
            </div>

            <div class="card w-full p-5 rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between mb-8">
                    <div class="w-[47%] text-center">
                        <p class="text-orange-500 text-[10px] mb-2 font-bold">ÉQUIPE 1</p>
                        <div class="bg-zinc-800/80 p-3 rounded-xl text-xs font-bold" id="view-t1">Manchester red</div>
                    </div>
                    <div class="w-[47%] text-center">
                        <p class="text-orange-500 text-[10px] mb-2 font-bold">ÉQUIPE 2</p>
                        <div class="bg-zinc-800/80 p-3 rounded-xl text-xs font-bold" id="view-t2">West Ham</div>
                    </div>
                </div>

                <div class="flex justify-around mb-8 text-center bg-zinc-900/40 py-2 rounded-2xl">
                    <div><p class="text-orange-500 text-[10px] font-bold">V1</p><p class="text-lg font-black" id="view-v1">1.63</p></div>
                    <div><p class="text-orange-500 text-[10px] font-bold">X</p><p class="text-lg font-black" id="view-x">4.08</p></div>
                    <div><p class="text-orange-500 text-[10px] font-bold">V2</p><p class="text-lg font-black" id="view-v2">4.98</p></div>
                </div>

                <div id="main-btn" class="bg-orange-600 py-4 rounded-2xl text-center font-bold text-sm mb-8 shadow-lg uppercase">
                    🏆 SCORE EXACTE 🔥
                </div>

                <div class="flex items-center justify-center gap-6 mb-4">
                    <span class="text-zinc-600 text-xs font-bold" id="view-t1-short">Man...</span>
                    <span class="text-green-500 text-6xl font-black tracking-tighter" id="view-res">2 - 0</span>
                    <span class="text-zinc-600 text-xs font-bold" id="view-t2-short">West...</span>
                </div>
                
                <div class="flex items-center justify-center gap-2 mt-4">
                    <span class="text-sm">🏅</span>
                    <p class="text-center text-green-500 font-bold text-sm" id="view-winner">Manchester red</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updatePreview() {
            // Maka ny noraiditinao
            const t1 = document.getElementById('input-t1').value || "Équipe 1";
            const t2 = document.getElementById('input-t2').value || "Équipe 2";
            const v1 = document.getElementById('input-v1').value || "1.00";
            const x = document.getElementById('input-x').value || "1.00";
            const v2 = document.getElementById('input-v2').value || "1.00";

            // Mametraka azy eo amin'ny sary
            document.getElementById('view-t1').innerText = t1;
            document.getElementById('view-t2').innerText = t2;
            document.getElementById('view-v1').innerText = v1;
            document.getElementById('view-x').innerText = x;
            document.getElementById('view-v2').innerText = v2;
            document.getElementById('view-t1-short').innerText = t1.substring(0, 5) + "...";
            document.getElementById('view-t2-short').innerText = t2.substring(0, 5) + "...";

            // LOGIC KELY: Manova ny score automatique araka ny côte
            let score1 = 0, score2 = 0;
            if (parseFloat(v1) < parseFloat(v2)) {
                score1 = parseFloat(v1) < 1.5 ? 3 : 2;
                score2 = parseFloat(v2) > 5 ? 0 : 1;
                document.getElementById('view-winner').innerText = t1;
            } else {
                score1 = parseFloat(v1) > 5 ? 0 : 1;
                score2 = parseFloat(v2) < 1.5 ? 3 : 2;
                document.getElementById('view-winner').innerText = t2;
            }
            document.getElementById('view-res').innerText = `${score1} - ${score2}`;
        }

        function selectType(name, el) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active-tab'));
            el.classList.add('active-tab');
            document.getElementById('main-btn').innerText = name + " 🔥";
            
            // Raha "Total Buts" ohatra dia ovaina ho "Plus 2.5" ny valiny
            if(name.includes('TOTAL')) {
                document.getElementById('view-res').innerText = "+ 2.5";
            } else {
                updatePreview();
            }
        }
    </script>
</body>
</html>
