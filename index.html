<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTOR V1</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,255,0,0.5);
        }
        h1 { color: #00ff00; }
        .clock {
            font-size: 30px;
            margin-bottom: 20px;
            color: #00ff00;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            text-align: center;
        }
        button {
            background-color: #00ff00;
            color: black;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 85%;
        }
        .result {
            margin-top: 20px;
            font-size: 25px;
            padding: 15px;
            border: 2px dashed #00ff00;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KING PREDICTOR</h1>
        <div class="clock" id="clock">00:00:00</div>

        <p>Ampidiro ny lera farany (H:M):</p>
        <input type="text" id="timeInput" placeholder="Ohatra: 14:05">
        
        <p>Seed (Ohatra: a1b2c3):</p>
        <input type="text" id="seedInput" placeholder="6 litera na isa">

        <button onclick="calculate()">ANALYSE</button>

        <div class="result" id="resultBox">
            Lera hidirana: <br>
            <strong id="predictedTime" style="color: #00ff00;">00:00</strong> <br>
            Cote: <strong id="predictedCote" style="color: #00ff00;">x2.00</strong>
        </div>
    </div>

    <script>
        // Clock function
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        function calculate() {
            const timeIn = document.getElementById('timeInput').value;
            const seedIn = document.getElementById('seedInput').value;

            if (timeIn === "" || seedIn === "") {
                alert("Fenoy ny banga azafady!");
                return;
            }

            // Simple Logic Algorithm
            let seedValue = 0;
            for(let i=0; i<seedIn.length; i++) {
                seedValue += seedIn.charCodeAt(i);
            }

            let timeParts = timeIn.split(':');
            let hour = parseInt(timeParts[0]);
            let minute = parseInt(timeParts[1]);

            // Prediction: Manampy 3 hatramin'ny 7 minitra
            let newMinute = minute + (seedValue % 5) + 3;
            if (newMinute >= 60) {
                newMinute -= 60;
                hour += 1;
            }

            // Formatage
            let fHour = hour < 10 ? "0" + hour : hour;
            let fMinute = newMinute < 10 ? "0" + newMinute : newMinute;
            
            let finalCote = (1.5 + (seedValue % 10) / 5).toFixed(2);

            document.getElementById('predictedTime').innerText = fHour + ":" + fMinute;
            document.getElementById('predictedCote').innerText = "x" + finalCote;
            document.getElementById('resultBox').style.display = "block";
        }
    </script>
</body>
</html>
