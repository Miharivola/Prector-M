<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Predictor VIP</title>
    <style>
        /* 1. ENDRIKA ANKAPOBENY */
        body {
            background-color: #0a0a0a;
            color: #d4af37;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #121212;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 22px; margin-bottom: 5px; color: #f1c40f; letter-spacing: 1px; }
        .subtitle { color: #777; font-size: 11px; margin-bottom: 25px; text-transform: none; }

        /* 2. BOKOTRA VOLAMENA */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(180deg, #f1c40f 0%, #d4af37 100%);
            color: #000;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        .btn:active { transform: scale(0.96); }

        /* 3. INPUTS PEJY 2 */
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: #b8860b; font-size: 10px; margin-bottom: 6px; font-weight: bold; }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #d4af37; }

        /* 4. PEJY VOKATRA (RESULTAT) */
        .result-card {
            background-color: rgba(15, 15, 15, 0.98);
            background-image: url('https://i.ibb.co/L6V6RzS/lion-logo.png'); /* Sary liona ohatra */
            background-repeat: no-repeat;
            background-position: center;
            background-size: 60%;
            background-blend-mode: overlay;
            padding: 25px 20px;
            border: 2px solid #d4af37;
            border-radius: 20px;
            margin-top: 15px;
        }

        .timer-val {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 15px;
            font-weight: bold;
        }

        .val-gold { color: #f1c40f; font-size: 22px; }
        .val-white { color: #ffffff; font-size: 22px; }
        .val-red { color: #ff4757; font-size: 22px; }

        .loading { display: none; color: #fff; font-size: 13px; margin: 15px 0; font-style: italic; }
        .back-link { margin-top: 25px; color: #555; cursor: pointer; font-size: 11px; display: inline-block; }
    </style>
</head>
<body>

    <div id="page1" class="container page active">
        <h1>💛 LAST PREDICTOR 💛</h1>
        <p class="subtitle">Choisissez votre jeu de prédiction</p>
        
        <button class="btn" onclick="showPage('page2', 'AVIATOR')">🚀 AVIATOR</button>
        <button class="btn" onclick="showPage('page2', 'JETX')">🚀 JETX</button>
        <button class="btn" onclick="showPage('page2', 'COSMOSX')">🚀 COSMOSX</button>
        
        <div class="back-link">← Retour au menu</div>
    </div>

    <div id="page2" class="container page">
        <h1 id="game-name">PRÉDICTION</h1>
        <p class="subtitle">Entrez les données du serveur</p>

        <div class="input-group">
            <label>HEURE DE DÉPART</label>
            <input type="text" id="input-time" placeholder="00:00:00">
        </div>
        <div class="input-group">
            <label>GRAINE DE SERVEUR (6 CARACT)</label>
            <input type="text" id="input-seed" placeholder="Ex: 403245">
        </div>

        <button class="btn" id="btn-calc" onclick="startCalculating()">🚀 PREDICTOR 🖤</button>
        <div id="loader" class="loading">Analyse des algorithmes en cours...</div>

        <div class="back-link" onclick="showPage('page1')">← Retour</div>
    </div>

    <div id="page3" class="container page">
        <div style="color: #2ecc71; font-weight: bold; margin-bottom: 10px; font-size: 12px;">
            <span style="font-size: 15px;">■</span> PRÉDICTION GÉNÉRÉE
        </div>

        <div class="result-card">
            <div class="timer-val" id="res-time">00:00:00</div>
            
            <div class="row">
                <span>🤍 BASE :</span>
                <span class="val-gold" id="val-base">x0.00</span>
            </div>
            
            <div class="row">
                <span>🤍 SÉCURITÉ :</span>
                <span class="val-white" id="val-secu">x0.00</span>
            </div>
            
            <div class="row" style="border-top: 1px solid #333; padding-top: 10px; margin-top: 15px;">
                <span>💜 RISQUE :</span>
                <span class="val-red" id="val-risque">x0.00</span>
            </div>
        </div>

        <div class="back-link" onclick="showPage('page2')">← Nouveau Calcul</div>
    </div>

    <script>
        // Fonction hifindrana pejy
        function showPage(pageId, title = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) document.getElementById('game-name').innerText = "PRÉDICTION " + title;
        }

        // Fikajiana ny isa kisendrasendra (Logic)
        function rand(min, max) {
            return (Math.random() * (max - min) + min).toFixed(2);
        }

        function startCalculating() {
            const time = document.getElementById('input-time').value;
            if(!time) { alert("Azafady, ampidiro ny ora!"); return; }

            // Animation loading
            document.getElementById('btn-calc').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                // Famenoana ny vokatra
                document.getElementById('res-time').innerText = time;
                document.getElementById('val-base').innerText = 'x' + rand(1.2, 4.5);
                document.getElementById('val-secu').innerText = 'x' + rand(5.0, 12.0);
                document.getElementById('val-risque').innerText = 'x' + rand(15.0, 85.0);

                // Mampiseho ny pejy vokatra
                document.getElementById('btn-calc').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                showPage('page3');
            }, 2000); // Miandry 2 segondra
        }
    </script>

</body>
</html>
