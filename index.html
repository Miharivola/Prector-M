<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Predictor VIP</title>
    <style>
        /* 1. ENDRIKA ANKAPOBENY (TSY NIOVA) */
        body {
            background-color: #0a0a0a;
            color: #d4af37;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        /* LERA MITSINGEVANA (FLOATING CLOCK) */
        #floating-clock {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid #d4af37;
            padding: 5px 12px;
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #121212;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 22px; margin-bottom: 5px; color: #f1c40f; letter-spacing: 1px; }
        .subtitle { color: #777; font-size: 11px; margin-bottom: 25px; text-transform: none; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(180deg, #f1c40f 0%, #d4af37 100%);
            color: #000;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.96); }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: #b8860b; font-size: 10px; margin-bottom: 6px; font-weight: bold; }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        .result-card {
            background-color: rgba(15, 15, 15, 0.95);
            background-image: url('https://i.ibb.co/L6V6RzS/lion-logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 60%;
            background-blend-mode: overlay;
            padding: 25px 20px;
            border: 2px solid #d4af37;
            border-radius: 20px;
            margin-top: 15px;
        }

        .timer-val {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 15px;
            font-weight: bold;
        }

        .val-gold { color: #f1c40f; font-size: 22px; }
        .val-white { color: #ffffff; font-size: 22px; }
        .val-red { color: #ff4757; font-size: 22px; }

        .loading { display: none; color: #fff; font-size: 13px; margin: 15px 0; font-style: italic; }
        .back-link { margin-top: 25px; color: #555; cursor: pointer; font-size: 11px; display: inline-block; }
    </style>
</head>
<body>

    <div id="floating-clock">00:00:00</div>

    <div id="page1" class="container page active">
        <h1>💛 LAST PREDICTOR 💛</h1>
        <p class="subtitle">Choisissez votre jeu de prédiction</p>
        <button class="btn" onclick="showPage('page2', 'AVIATOR')">🚀 AVIATOR</button>
        <button class="btn" onclick="showPage('page2', 'JETX')">🚀 JETX</button>
        <button class="btn" onclick="showPage('page2', 'COSMOSX')">🚀 COSMOSX</button>
    </div>

    <div id="page2" class="container page">
        <h1 id="game-name">PRÉDICTION</h1>
        <p class="subtitle">Entrez les données du serveur</p>
        <div class="input-group">
            <label>HEURE DE DÉPART</label>
            <input type="text" id="input-time" placeholder="HH:MM:SS">
        </div>
        <div class="input-group">
            <label>GRAINE DE SERVEUR (6 CARACT)</label>
            <input type="text" id="input-seed" placeholder="Ex: B2CE53">
        </div>
        <button class="btn" id="btn-calc" onclick="startCalculating()">🚀 PREDICTOR 🖤</button>
        <div id="loader" class="loading">Analyse des algorithmes...</div>
        <div class="back-link" onclick="showPage('page1')">← RETOUR</div>
    </div>

    <div id="page3" class="container page">
        <div style="color: #2ecc71; font-weight: bold; margin-bottom: 10px; font-size: 12px;">■ PRÉDICTION GÉNÉRÉE</div>
        <div class="result-card">
            <div class="timer-val" id="res-time">00:00:00</div>
            <div class="row"><span>🤍 BASE :</span><span class="val-gold" id="val-base">x0.00</span></div>
            <div class="row"><span>🤍 SÉCURITÉ :</span><span class="val-white" id="val-secu">x0.00</span></div>
            <div class="row" style="border-top: 1px solid #333; padding-top: 10px; margin-top: 15px;">
                <span>💜 RISQUE :</span><span class="val-red" id="val-risque">x0.00</span>
            </div>
        </div>
        <div class="back-link" onclick="showPage('page2')">← NOUVEAU CALCUL</div>
    </div>

    <script>
        // UPDATE NY LERA MITSINGEVANA ISAKY NY SEGONDRA
        function updateClock() {
            let now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('floating-clock').innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showPage(pageId, title = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) document.getElementById('game-name').innerText = "PRÉDICTION " + title;
        }

        function calculateFutureTime(startTime) {
            try {
                let parts = startTime.split(':');
                let date = new Date();
                date.setHours(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
                
                // Manampy 1-5 minitra aorian'ny lera nampidirina
                let addMinutes = Math.floor(Math.random() * 5) + 1;
                let addSeconds = Math.floor(Math.random() * 59);
                date.setMinutes(date.getMinutes() + addMinutes);
                date.setSeconds(date.getSeconds() + addSeconds);

                return date.toTimeString().split(' ')[0];
            } catch (e) { return startTime; }
        }

        function rand(min, max) { return (Math.random() * (max - min) + min).toFixed(2); }

        function startCalculating() {
            const timeInput = document.getElementById('input-time').value;
            if(!timeInput || !timeInput.includes(':')) {
                alert("Format HH:MM:SS svp");
                return;
            }

            document.getElementById('btn-calc').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                document.getElementById('res-time').innerText = calculateFutureTime(timeInput);
                document.getElementById('val-base').innerText = 'x' + rand(1.5, 3.5);
                document.getElementById('val-secu').innerText = 'x' + rand(3.6, 9.0);
                document.getElementById('val-risque').innerText = 'x' + rand(9.1, 45.0);

                document.getElementById('btn-calc').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                showPage('page3');
            }, 2000);
        }

        window.onload = function() {
            let n = new Date();
            document.getElementById('input-time').value = n.toTimeString().split(' ')[0];
        };
    </script>
</body>
</html>
