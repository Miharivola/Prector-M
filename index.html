<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Predictor VIP</title>
    <style>
        /* --- LERA MITSINGEVANA (FLOATING TIMER) --- */
        #floating-clock {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #floating-clock::before {
            content: "🕒";
            margin-right: 6px;
            font-size: 12px;
        }

        /* --- STYLE REHETRA --- */
        body {
            background-color: #0a0a0a;
            color: #d4af37;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #121212;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 20px; color: #f1c40f; }
        .subtitle { color: #777; font-size: 10px; margin-bottom: 20px; text-transform: none; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            background: linear-gradient(180deg, #f1c40f 0%, #d4af37 100%);
            color: #000;
            cursor: pointer;
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: #b8860b; font-size: 10px; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
        }

        .result-card {
            background: #0f0f0f url('https://i.ibb.co/L6V6RzS/lion-logo.png') no-repeat center;
            background-size: 50%;
            background-blend-mode: overlay;
            padding: 20px;
            border: 2px solid #d4af37;
            border-radius: 20px;
        }

        .timer-val { font-size: 38px; font-weight: 900; color: #fff; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; }
        .val-gold { color: #f1c40f; font-size: 20px; font-weight: bold; }
        .val-red { color: #ff4757; font-size: 20px; font-weight: bold; }
        .loading { display: none; color: #fff; margin: 15px 0; font-style: italic; font-size: 12px; }
    </style>
</head>
<body>

    <div id="floating-clock">00:00:00</div>

    <div id="page1" class="container page active">
        <h1>💛 LAST PREDICTOR 💛</h1>
        <p class="subtitle">Choisissez votre jeu de prédiction</p>
        <button class="btn" onclick="showPage('page2', 'AVIATOR')">🚀 AVIATOR</button>
        <button class="btn" onclick="showPage('page2', 'JETX')">🚀 JETX</button>
        <button class="btn" onclick="showPage('page2', 'COSMOSX')">🚀 COSMOSX</button>
    </div>

    <div id="page2" class="container page">
        <h1 id="game-name">PRÉDICTION</h1>
        <div class="input-group">
            <label>HEURE DE DÉPART</label>
            <input type="text" id="input-time" placeholder="HH:MM:SS">
        </div>
        <div class="input-group">
            <label>GRAINE DE SERVEUR (6 CARACT)</label>
            <input type="text" id="input-seed" placeholder="Ex: B2CE53">
        </div>
        <button class="btn" id="btn-calc" onclick="startCalculating()">🚀 PREDICTOR 🖤</button>
        <div id="loader" class="loading">Analyse des algorithmes...</div>
        <button style="background:none; border:none; color:#555; cursor:pointer;" onclick="showPage('page1')">← RETOUR</button>
    </div>

    <div id="page3" class="container page">
        <div style="color: #2ecc71; font-weight: bold; font-size: 10px; margin-bottom: 10px;">■ PRÉDICTION GÉNÉRÉE</div>
        <div class="result-card">
            <div class="timer-val" id="res-time">00:00:00</div>
            <div class="row"><span>🤍 BASE :</span><span class="val-gold" id="val-base">x0.00</span></div>
            <div class="row"><span>🤍 SÉCURITÉ :</span><span class="val-gold" id="val-secu" style="color:#fff">x0.00</span></div>
            <div class="row" style="border-top:1px solid #333; padding-top:10px;">
                <span>💜 RISQUE :</span><span class="val-red" id="val-risque">x0.00</span>
            </div>
        </div>
        <button class="btn" style="margin-top:20px;" onclick="showPage('page2')">NOUVEAU CALCUL</button>
    </div>

    <script>
        // Update ny lera mitsingevana isaky ny segondra
        function updateClock() {
            let now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('floating-clock').innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showPage(pageId, title = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) document.getElementById('game-name').innerText = "PRÉDICTION " + title;
        }

        function calculateFutureTime(startTime) {
            let parts = startTime.split(':');
            let date = new Date();
            date.setHours(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
            date.setMinutes(date.getMinutes() + Math.floor(Math.random() * 4) + 1);
            date.setSeconds(Math.floor(Math.random() * 59));
            return date.toTimeString().split(' ')[0];
        }

        function startCalculating() {
            const timeVal = document.getElementById('input-time').value;
            document.getElementById('btn-calc').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                document.getElementById('res-time').innerText = calculateFutureTime(timeVal);
                document.getElementById('val-base').innerText = 'x' + (Math.random() * 3 + 1.2).toFixed(2);
                document.getElementById('val-secu').innerText = 'x' + (Math.random() * 10 + 5).toFixed(2);
                document.getElementById('val-risque').innerText = 'x' + (Math.random() * 50 + 15).toFixed(2);
                
                document.getElementById('btn-calc').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                showPage('page3');
            }, 2000);
        }

        window.onload = function() {
            let n = new Date();
            document.getElementById('input-time').value = n.toTimeString().split(' ')[0];
        };
    </script>
</body>
</html>
