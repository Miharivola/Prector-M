<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor App - Harivola</title>
    <style>
        /* Stylisme ankapobeny */
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        /* Pejy Menu */
        #menu-page { display: block; }
        #predict-page { display: none; }

        h1 {
            color: #FFD700;
            font-size: 26px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .subtitle { color: #888; font-size: 14px; margin-bottom: 35px; }

        /* Bokotra Menu */
        .btn-menu {
            background: linear-gradient(180deg, #FFD700 0%, #B8860B 100%);
            border: none;
            border-radius: 12px;
            color: black;
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Pejy Predictor */
        .predict-box {
            border: 2px solid #FFD700;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
        }

        #result-display {
            font-size: 55px;
            color: #FFD700;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .btn-action {
            background: #FFD700;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .back-link { color: #555; text-decoration: none; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="menu-page">
            <h1>💛 LAST PREDICTOR 💛</h1>
            <p class="subtitle">Choisissez votre jeu de prédiction</p>
            
            <button class="btn-menu" onclick="showPredictor('AVIATOR')">🚀 AVIATOR</button>
            <button class="btn-menu" onclick="showPredictor('JETX')">🚀 JETX</button>
            <button class="btn-menu" onclick="showPredictor('COSMOSX')">🚀 COSMOSX</button>
            
            <div class="back-link" style="margin-top: 40px;">← Retour au menu</div>
        </div>

        <div id="predict-page">
            <h1 id="game-title">PREDICTION</h1>
            
            <div class="predict-box">
                <p style="font-size: 14px; color: #aaa;">PROCHAIN SIGNAL À :</p>
                <div id="result-display">--.--x</div>
                <button class="btn-action" onclick="getPrediction()">PREDICTOR 💛</button>
            </div>
            
            <div class="back-link" style="margin-top: 30px;" onclick="showMenu()">← Retour au menu</div>
        </div>

    </div>

    <script>
        // Fonction hanovana pejy
        function showPredictor(gameName) {
            document.getElementById('menu-page').style.display = 'none';
            document.getElementById('predict-page').style.display = 'block';
            document.getElementById('game-title').innerText = "PREDICTION " + gameName;
            document.getElementById('result-display').innerText = "--.--x";
        }

        function showMenu() {
            document.getElementById('predict-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
        }

        // Fonction mamoaka isa kisendrasendra
        function getPrediction() {
            const resultDiv = document.getElementById('result-display');
            resultDiv.innerText = "Wait..."; // Miandry kely aloha
            
            setTimeout(() => {
                const randomVal = (Math.random() * 8 + 1.1).toFixed(2);
                resultDiv.innerText = randomVal + "x";
            }, 500);
        }
    </script>

</body>
</html>
