<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor VIP</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-transform: uppercase; }
        #floating-clock { position: fixed; top: 10px; left: 10px; background: #111; border: 1px solid #f1c40f; padding: 5px 10px; border-radius: 5px; color: #fff; font-weight: bold; z-index: 100; }
        .container { width: 90%; max-width: 350px; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .page { display: none; }
        .active { display: block; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: linear-gradient(#f1c40f, #b8860b); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; text-align: center; box-sizing: border-box; }
        .result-card { border: 2px solid #f1c40f; padding: 20px; border-radius: 15px; margin-top: 15px; background: #050505; }
        .timer-val { font-size: 35px; color: #fff; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="floating-clock">--:--:--</div>
    <div class="container">
        <div id="p1" class="page active">
            <div style="font-size: 50px;">👑</div>
            <h2>VIP PREDICTOR</h2>
            <button class="btn" onclick="go(2, 'AVIATOR')">🚀 AVIATOR</button>
            <button class="btn" onclick="go(2, 'JETX')">🚀 JETX</button>
            <button class="btn" onclick="go(2, 'COSMOSX')">🚀 COSMOSX</button>
        </div>
        <div id="p2" class="page">
            <h2 id="title">PREDICTION</h2>
            <input type="text" id="time-in">
            <input type="text" id="seed-in" value="SEED-999">
            <button class="btn" id="calc-btn" onclick="calc()">🔥 ANALYSER</button>
            <div id="loading" style="display:none; color:white; margin:10px;">Veuillez patienter...</div>
            <p onclick="go(1)" style="font-size:12px; cursor:pointer;">← RETOUR</p>
        </div>
        <div id="p3" class="page">
            <div class="result-card">
                <div class="timer-val" id="res-t">00:00:00</div>
                <div class="row"><span>CIBLE:</span><span style="color:#f1c40f;">x2.15</span></div>
                <div class="row"><span>RISQUE:</span><span style="color:#ff4757;">x15.40</span></div>
            </div>
            <button class="btn" onclick="go(2)">NOUVEAU</button>
        </div>
    </div>
    <script>
        function update() {
            let n = new Date();
            document.getElementById('floating-clock').innerText = n.toTimeString().split(' ')[0];
        }
        setInterval(update, 1000);
        function go(n, t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
            if(t) document.getElementById('title').innerText = t;
        }
        function calc() {
            document.getElementById('calc-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => {
                let s = document.getElementById('time-in').value.split(':');
                let d = new Date();
                d.setHours(s[0], s[1], s[2]);
                d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 3) + 1);
                document.getElementById('res-t').innerText = d.toTimeString().split(' ')[0];
                document.getElementById('calc-btn').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                go(3);
            }, 2000);
        }
        window.onload = () => { document.getElementById('time-in').value = new Date().toTimeString().split(' ')[0]; update(); };
    </script>
</body>
</html>
