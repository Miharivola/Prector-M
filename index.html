<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Predictor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #05080f; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 28px; }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; text-align: center; font-weight: bold; }
        .btn-calc { background: linear-gradient(90deg, #86efac, #fde047); color: #000; font-weight: 900; }
        .result-box { border: 1px solid #1e293b; border-radius: 16px; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6 px-1">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 border-2 border-yellow-500 rotate-45 flex items-center justify-center shadow-[0_0_15px_rgba(234,179,8,0.2)]">
                    <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></div>
                </div>
                <div class="text-yellow-500 font-bold text-[10px] leading-none uppercase">Blizzard-<br>Imperial</div>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-cyan-500/10 text-cyan-400 px-3 py-1.5 rounded-lg border border-cyan-500/30 text-[11px] font-bold flex items-center gap-1">
                    <i data-lucide="shield-check" class="w-3 h-3"></i> Admin
                </div>
                <button onclick="toggleHistory()" class="text-gray-400 hover:text-white transition"><i data-lucide="history" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div class="glass-card p-6 shadow-2xl">
            <div class="flex justify-center mb-1 text-yellow-500/40">
                <i data-lucide="calculator" class="w-6 h-6"></i>
            </div>
            <h2 class="text-center text-lg font-bold mb-6 tracking-wide text-white/90">Calculateur de Prédiction</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1.5 ml-1 block tracking-widest">N° de Tour</label>
                    <input id="tour" type="number" class="w-full input-field p-4 rounded-2xl text-2xl border-cyan-500/20 shadow-inner" placeholder="8029946">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <input id="mult" type="number" step="0.01" class="w-full input-field p-3 rounded-xl text-sm" placeholder="Multiplicateur (ex: 8.39)">
                    <input id="dec" type="number" class="w-full input-field p-3 rounded-xl text-sm" placeholder="Décimal (ex: 496353252)">
                    <input id="cons" type="number" class="w-full input-field p-3 rounded-xl text-sm opacity-50" value="4294967295" readonly>
                </div>

                <div class="flex gap-3 mt-6">
                    <button onclick="calculate()" class="flex-[2] btn-calc py-4 rounded-2xl uppercase text-sm tracking-[0.2em] active:scale-95 transition shadow-lg shadow-yellow-500/10">Calculer</button>
                    <button onclick="resetAll()" class="flex-1 bg-black/60 border border-white/5 py-4 rounded-2xl uppercase text-[10px] font-bold text-gray-500 hover:text-white transition">Reset</button>
                </div>
            </div>

            <div id="results" class="mt-8 space-y-3">
                <div class="result-box p-5 text-center border-yellow-500/40 bg-yellow-500/5 ring-1 ring-yellow-500/10">
                    <p class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-[0.2em]">N° de Tour Manaraka</p>
                    <p id="res-tour" class="text-yellow-500 text-4xl font-black drop-shadow-[0_0_8px_rgba(234,179,8,0.3)]">-------</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="result-box p-4 text-center bg-white/5">
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase tracking-widest">Côte Moyen</p>
                        <p id="res-moy" class="text-white text-2xl font-black">0.00</p>
                    </div>

                    <div class="result-box p-4 text-center border-green-500/30 bg-green-500/5 ring-1 ring-green-500/10">
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase tracking-widest">Côte Max</p>
                        <p id="res-max" class="text-green-400 text-2xl font-black">0.00</p>
                    </div>
                </div>
            </div>

            <div id="history-panel" class="hidden mt-6 p-4 bg-black/50 border border-gray-800 rounded-2xl text-[11px] font-mono shadow-inner">
                <p class="text-cyan-400 mb-3 border-b border-gray-800 pb-2 uppercase font-black tracking-widest">Tantara farany</p>
                <div id="history-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let history = [];

        function calculate() {
            const tourVal = document.getElementById('tour').value;
            if (!tourVal) return alert("Ampidiro aloha ny N° de Tour!");
            const currentTour = parseInt(tourVal);

            const mult = parseFloat(document.getElementById('mult').value) || 1.00;
            const decStr = document.getElementById('dec').value || "1";
            const dec = parseFloat(decStr);
            
            // 1. Lojika fikajiana ny Tour manaraka
            // Miankina amin'ny sisa amin'ny fizarana (modulo) ny jump
            let seed = (dec % 100) || 1;
            let jump = 1 + (seed % 2); // Jump 1 na 2 foana
            const nextTour = currentTour + jump;

            // 2. Algorithm ho an'ny Côte Moyen sy Max
            // Natao mifanaraka tsara amin'ny sisa amin'ny fizarana ny Decimal
            let hashMod = (dec % 1000) / 100;
            let cMoy = 1.80 + (hashMod * 1.5) + (mult * 0.2);
            let cMax = (cMoy * 2.5) + (seed % 20);

            // Antoka fa tsy kely loatra ny valiny
            if (cMoy < 2) cMoy = 2.15 + (mult / 4);
            if (cMax < 5) cMax = 10.42 + (mult * 2);

            // 3. Miseho eo amin'ny UI
            document.getElementById('res-tour').innerText = nextTour;
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);

            // 4. Tehirizina ny tantara
            history.unshift(`Tour ${nextTour} ➔ Moy: ${cMoy.toFixed(2)} | Max: ${cMax.toFixed(2)}`);
            updateHistoryUI();
        }

        function toggleHistory() {
            document.getElementById('history-panel').classList.toggle('hidden');
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.slice(0, 5).map(item => `<div class="text-gray-400 border-b border-white/5 pb-1 tracking-tighter">• ${item}</div>`).join('');
        }

        function resetAll() {
            document.getElementById('tour').value = "";
            document.getElementById('res-tour').innerText = "-------";
            document.getElementById('res-moy').innerText = "0.00";
            document.getElementById('res-max').innerText = "0.00";
        }
    </script>
</body>
</html>
