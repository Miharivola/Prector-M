<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Boss Bet</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { width: 95%; max-width: 400px; text-align: center; }
        .page { display: none; }
        .active { display: block; }

        /* Style Menu */
        .btn-gold {
            background: linear-gradient(180deg, #d4af37 0%, #8a6d3b 100%);
            border-radius: 12px;
            color: #000;
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        /* Style Predictor Page */
        .card-main {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .server-seed {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            font-size: 20px;
            color: #d4af37;
            letter-spacing: 5px;
        }

        /* Ny vata misy ny isa (tahaka ny sary nalefanao) */
        .prediction-box {
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://i.ibb.co/vzB7pYn/boss-bet-logo.png'); /* Azonao ovaina ny logo eto */
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }

        .time-now { font-size: 28px; font-weight: bold; margin-bottom: 15px; }
        
        .row-val {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px 0;
            font-weight: bold;
            font-size: 18px;
        }

        .dot { margin-right: 10px; }
        .val-base { color: #fff; }
        .val-secu { color: #4cd137; }
        .val-risk { color: #a55eea; }

        .btn-predict-gold {
            background: linear-gradient(180deg, #d4af37 0%, #8a6d3b 100%);
            border: none;
            border-radius: 10px;
            width: 100%;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        .back { color: #666; font-size: 12px; margin-top: 20px; cursor: pointer; display: block; }
    </style>
</head>

<div class="container">
    <div id="p1" class="page active">
        <h2 style="color:#d4af37">LAST PREDICTOR</h2>
        <button class="btn-gold" onclick="openGame('AVIATOR')">🚀 AVIATOR</button>
        <button class="btn-gold" onclick="openGame('JETX')">🚀 JETX</button>
        <button class="btn-gold" onclick="openGame('COSMOSX')">🚀 COSMOSX</button>
    </div>

    <div id="p2" class="page">
        <div class="card-main">
            <div style="font-size: 12px; color: #888;">Graine de serveur (6 caractères)</div>

            <button class="btn-predict-gold" onclick="updateAll()">🚀 PREDICTOR 🖤</button>
        </div>

        <div class="prediction-box">
            <div style="color: #4cd137; font-size: 14px;">■ PRÉDICTION <span id="game-title"></span></div>
            <div id="clock" class="time-now">00:00:00</div>
            
            <div class="row-val val-base">
                <span class="dot">🤍</span> BASE : <span id="v1">x0.00</span>
            </div>
            <div class="row-val val-secu">
                <span class="dot">💚</span> SÉCURITÉ : <span id="v2">x0.00</span>
            </div>
            <div class="row-val val-risk">
                <span class="dot">💜</span> RISQUE : <span id="v3">x0.00</span>
            </div>
        </div>

        <span class="back" onclick="location.reload()">← Retour au menu</span>
    </div>
</div>
