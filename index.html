<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Predictor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #05080f; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 24px; }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; text-align: center; font-weight: bold; }
        .btn-calc { background: linear-gradient(90deg, #86efac, #fde047); color: #000; font-weight: 900; }
        .result-box { border: 1px solid #1e293b; border-radius: 12px; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6 px-1">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 border-2 border-yellow-500 rotate-45 flex items-center justify-center">
                    <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></div>
                </div>
                <div class="text-yellow-500 font-bold text-[10px] leading-none uppercase">Blizzard-<br>Imperial</div>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-cyan-500/10 text-cyan-400 px-3 py-1.5 rounded-lg border border-cyan-500/30 text-[11px] font-bold flex items-center gap-1">
                    <i data-lucide="shield-check" class="w-3 h-3"></i> Admin
                </div>
                <button onclick="toggleHistory()" class="text-gray-400 hover:text-white"><i data-lucide="history" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div class="glass-card p-6 shadow-2xl">
            <h2 class="text-center text-lg font-bold mb-6 tracking-wide">Calculateur de Prédiction</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1 block">N° de Tour</label>
                    <input id="tour" type="number" class="w-full input-field p-3 rounded-xl text-xl" placeholder="Ohatra: 8029946">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <input id="mult" type="number" step="0.01" class="w-full input-field p-2 rounded-lg text-sm" placeholder="Multiplicateur">
                    <input id="dec" type="number" class="w-full input-field p-2 rounded-lg text-sm" placeholder="Décimal">
                    <input id="cons" type="number" class="w-full input-field p-2 rounded-lg text-sm opacity-50" value="4294967295" readonly>
                </div>

                <div class="flex gap-3 mt-4">
                    <button onclick="calculate()" class="flex-[2] btn-calc py-4 rounded-xl uppercase text-sm tracking-widest active:scale-95 transition">Calculer</button>
                    <button onclick="resetAll()" class="flex-1 bg-black/60 border border-white/10 py-4 rounded-xl uppercase text-[10px] font-bold text-gray-400">Reset</button>
                </div>
            </div>

            <div id="results" class="mt-8 grid grid-cols-2 gap-3">
                <div class="result-box p-4 text-center border-yellow-500/50 bg-yellow-500/5 col-span-2">
                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase tracking-widest">N° de Tour (Prochain)</p>
                    <p id="res-tour" class="text-yellow-500 text-3xl font-black">-------</p>
                </div>
                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">CÔTE BASE</p>
                    <p id="res-base" class="text-blue-400 text-xl font-bold">0.00</p>
                </div>
                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">PROBABILITÉ</p>
                    <p id="res-prob" class="text-white text-xl font-bold">0%</p>
                </div>
                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">COTE MOYEN</p>
                    <p id="res-moy" class="text-white text-xl font-bold">0.00</p>
                </div>
                <div class="result-box p-3 text-center border-green-500/30">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">COTE MAX</p>
                    <p id="res-max" class="text-green-400 text-xl font-bold">0.00</p>
                </div>
            </div>

            <div id="history-panel" class="hidden mt-4 p-3 bg-black/50 border border-gray-800 rounded-xl text-[10px] font-mono">
                <p class="text-cyan-400 mb-2 border-b border-gray-800 pb-1 uppercase">Historique des Prédictions</p>
                <div id="history-list" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let history = [];

        function calculate() {
            const currentTour = parseInt(document.getElementById('tour').value);
            if (!currentTour) return alert("Ampidiro ny N° de Tour!");

            const mult = parseFloat(document.getElementById('mult').value) || 1.00;
            const dec = document.getElementById('dec').value || "1";
            
            // Lojika fikajiana ny Tour manaraka
            // Matetika dia mitsambikina 1 hatramin'ny 3 ny tour miankina amin'ny decimal
            let seed = (parseFloat(dec.substring(0, 3)) % 10) || 1;
            let jump = 1 + (seed % 3); 
            const nextTour = currentTour + jump;

            // Fikajiana ny Côte
            let oddsSeed = (parseFloat(dec.substring(0, 5)) % 1000);
            const cBase = 1.10 + (oddsSeed % 40) / 100;
            const cMax = 1.50 + (oddsSeed % 150) / 10;
            const cMoy = (cBase + cMax) / 2.1;
            
            // Fikajiana Probabilité (randomized for UI)
            const prob = 75 + (seed % 20);

            // Miseho eo amin'ny UI
            document.getElementById('res-tour').innerText = nextTour;
            document.getElementById('res-base').innerText = cBase.toFixed(2);
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);
            document.getElementById('res-prob').innerText = prob + "%";

            // Tehirizina
            history.unshift(`Tour Input ${currentTour} ➔ Next ${nextTour}`);
            updateHistoryUI();
        }

        function toggleHistory() {
            document.getElementById('history-panel').classList.toggle('hidden');
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.slice(0, 5).map(item => `<div class="border-b border-white/5 pb-1">• ${item}</div>`).join('');
        }

        function resetAll() {
            document.getElementById('tour').value = "";
            document.getElementById('res-tour').innerText = "-------";
            document.getElementById('res-base').innerText = "0.00";
            document.getElementById('res-moy').innerText = "0.00";
            document.getElementById('res-max').innerText = "0.00";
            document.getElementById('res-prob').innerText = "0%";
        }
    </script>
</body>
</html>
