<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor VIP</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        
        /* Pejy roa samy hafa */
        .page { display: none; }
        .active { display: block; }

        /* Stylisme Menu */
        .title-gold { color: #d4af37; font-size: 24px; font-weight: bold; margin-bottom: 30px; }
        .btn-gold { 
            background: linear-gradient(180deg, #d4af37, #8a6d3b); 
            border: none; border-radius: 12px; color: #000; 
            width: 100%; padding: 20px; margin: 10px 0; 
            font-weight: bold; font-size: 18px; cursor: pointer;
        }

        /* Stylisme Predictor (Tahaka ny sary 2 sy 7) */
        .card-dark { background: #151515; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        .seed-box { background: #222; padding: 15px; border-radius: 8px; color: #d4af37; font-size: 22px; letter-spacing: 3px; margin: 10px 0; }
        
        .predict-area { 
            border: 2px solid #d4af37; border-radius: 20px; padding: 20px; 
            background: rgba(20, 20, 20, 0.9); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        
        .time { font-size: 25px; font-weight: bold; margin-bottom: 15px; color: #fff; }
        .val-row { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .base { color: #fff; } .secu { color: #4cd137; } .risk { color: #a55eea; }

        .btn-action { background: #d4af37; border: none; border-radius: 10px; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .back { color: #666; font-size: 12px; margin-top: 30px; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div id="page-menu" class="page active">
            <div class="title-gold">💛 LAST PREDICTOR 💛</div>
            <button class="btn-gold" onclick="switchPage('AVIATOR')">🚀 AVIATOR</button>
            <button class="btn-gold" onclick="switchPage('JETX')">🚀 JETX</button>
            <button class="btn-gold" onclick="switchPage('COSMOSX')">🚀 COSMOSX</button>
        </div>

        <div id="page-predict" class="page">
            <div class="card-dark">
                <div style="font-size: 12px; color: #888;">Graine de serveur</div>
                <div id="seed-val" class="seed-box">403245</div>
                <button class="btn-action" onclick="generateNew()">🚀 PREDICTOR 🖤</button>
            </div>

            <div class="predict-area">
                <div style="color: #4cd137; font-size: 13px; margin-bottom: 10px;">■ PRÉDICTION <span id="game-name"></span></div>
                <div id="clock" class="time">00:00:00</div>
                
                <div class="val-row base">🤍 BASE : <span id="v1">x0.00</span></div>
                <div class="val-row secu">💚 SÉCURITÉ : <span id="v2">x0.00</span></div>
                <div class="val-row risk">💜 RISQUE : <span id="v3">x0.00</span></div>
            </div>

            <span class="back" onclick="location.reload()">← Retour au menu</span>
        </div>
    </div>

    <script>
        // Mampiseho ny ora
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Manova pejy
        function switchPage(name) {
            document.getElementById('page-menu').style.display = 'none';
            document.getElementById('page-predict').style.display = 'block';
            document.getElementById('game-name').innerText = name;
        }

        // Mampipoitra isa vaovao
        function generateNew() {
            // Seed
            document.getElementById('seed-val').innerText = Math.floor(100000 + Math.random() * 900000);
            // Isa 3 (Base, Secu, Risk)
            document.getElementById('v1').innerText = "x" + (Math.random() * 2 + 1.1).toFixed(2);
            document.getElementById('v2').innerText = "x" + (Math.random() * 8 + 4).toFixed(2);
            document.getElementById('v3').innerText = "x" + (Math.random() * 40 + 15).toFixed(2);
        }
    </script>
</body>
</html>
