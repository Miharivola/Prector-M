<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor App - Harivola</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        /* Miafina ny pejy faharoa amin'ny voalohany */
        #menu-page { display: block; }
        #predict-page { display: none; }

        h1 {
            color: #FFD700;
            font-size: 26px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .subtitle { color: #888; font-size: 14px; margin-bottom: 35px; }

        .btn-menu {
            background: linear-gradient(180deg, #FFD700 0%, #B8860B 100%);
            border: none;
            border-radius: 12px;
            color: black;
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Pejy Predictor (tahaka ny ao amin'ny sary faharoa) */
        .predict-box {
            border: 2px solid #FFD700;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
        }

        #result-display {
            font-size: 55px;
            color: #FFD700;
            font-weight: bold;
            margin: 20px 0;
        }

        .btn-action {
            background: #FFD700;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        .back-link { 
            color: #555; 
            text-decoration: none; 
            font-size: 13px; 
            cursor: pointer; 
            display: block; 
            margin-top: 30px; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="menu-page">
            <h1>💛 LAST PREDICTOR 💛</h1>
            <p class="subtitle">Choisissez votre jeu de prédiction</p>
            
            <button class="btn-menu" onclick="switchPage('AVIATOR')">🚀 AVIATOR</button>
            <button class="btn-menu" onclick="switchPage('JETX')">🚀 JETX</button>
            <button class="btn-menu" onclick="switchPage('COSMOSX')">🚀 COSMOSX</button>
            
            <div class="back-link">← Retour au menu</div>
        </div>

        <div id="predict-page">
            <h1 id="game-title">PREDICTION</h1>
            
            <div class="predict-box">
                <p style="font-size: 14px; color: #aaa;">PROCHAIN SIGNAL À :</p>
                <div id="result-display">--.--x</div>
                <button class="btn-action" onclick="runPrediction()">PREDICTOR 💛</button>
            </div>
            
            <div class="back-link" onclick="goToMenu()">← Retour au menu</div>
        </div>

    </div>

    <script>
        // Mifindra amin'ny pejy predictor
        function switchPage(name) {
            document.getElementById('menu-page').style.display = 'none';
            document.getElementById('predict-page').style.display = 'block';
            document.getElementById('game-title').innerText = "PREDICTION " + name;
        }

        // Miverina amin'ny menu
        function goToMenu() {
            document.getElementById('predict-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            document.getElementById('result-display').innerText = "--.--x";
        }

        // Mampiseho isa (Prediction)
        function runPrediction() {
            const display = document.getElementById('result-display');
            display.innerText = "Wait..."; 
            
            setTimeout(() => {
                const val = (Math.random() * 5 + 1.1).toFixed(2);
                display.innerText = val + "x";
            }, 800);
        }
    </script>

</body>
</html>
