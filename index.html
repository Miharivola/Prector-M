<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Crystal V8 (Safe Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(234, 179, 8, 0.4); border-radius: 28px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
        .input-field { background: #0f172a; border: 1px solid #1e293b; color: white; text-align: center; transition: 0.3s; }
        .input-field:focus { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); outline: none; }
        .btn-calc { background: linear-gradient(90deg, #fbbf24, #d97706); color: #000; font-weight: 900; letter-spacing: 0.1em; }
        .result-box { border: 1px solid #1e293b; border-radius: 20px; background: rgba(30, 41, 59, 0.7); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 border-2 border-yellow-500 rotate-45 flex items-center justify-center bg-yellow-500/5">
                    <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                </div>
                <div class="text-yellow-500 font-black text-[11px] leading-none uppercase tracking-tighter">Blizzard-<br>Imperial</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full border border-emerald-500/30 text-[10px] font-bold">V8.0 SAFE</div>
                <button onclick="toggleHistory()" class="text-gray-400 hover:text-white"><i data-lucide="history" class="w-6 h-6"></i></button>
            </div>
        </div>

        <div class="glass-card p-6 border-t-4 border-t-yellow-500">
            <h2 class="text-center text-sm font-black mb-6 tracking-[0.3em] text-gray-400 uppercase">Algorithm Long-Range</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1.5 ml-1 block">N° de Tour (Farany vita)</label>
                    <input id="tour" type="number" class="w-full input-field p-4 rounded-2xl text-2xl font-mono text-yellow-500" placeholder="8029946">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <input id="mult" type="number" step="0.01" class="w-full input-field p-3 rounded-xl text-sm" placeholder="Multiplicateur (ex: 8.39)">
                    <input id="dec" type="text" class="w-full input-field p-3 rounded-xl text-sm font-mono" placeholder="Hash / Décimal feno">
                    <div class="relative">
                        <input id="cons" type="number" class="w-full input-field p-3 rounded-xl text-sm font-bold text-gray-500" value="4294967295" readonly>
                        <span class="absolute right-3 top-3 text-[8px] text-gray-600 font-bold uppercase">Constant</span>
                    </div>
                </div>

                <button onclick="calculate()" class="w-full btn-calc py-5 rounded-2xl uppercase text-sm active:scale-95 transition mt-4 shadow-xl shadow-yellow-600/20">
                    HAMINANY (PREDICT)
                </button>
            </div>

            <div class="mt-8 space-y-4">
                <div class="result-box p-6 text-center border-yellow-500/30 bg-yellow-500/5 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-yellow-500/20"></div>
                    <p class="text-[10px] text-gray-500 font-black mb-1 uppercase tracking-widest">Target Tour Prediction</p>
                    <p id="res-tour" class="text-white text-4xl font-black tracking-tighter italic">-------</p>
                    <p id="res-gap" class="text-[10px] text-emerald-400 mt-2 font-bold uppercase"></p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="result-box p-4 text-center border-white/5">
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Côte Moyen</p>
                        <p id="res-moy" class="text-white text-2xl font-black">0.00</p>
                    </div>
                    <div class="result-box p-4 text-center border-emerald-500/30 bg-emerald-500/5">
                        <p class="text-[9px] text-gray-400 font-bold mb-1 uppercase">Côte Max</p>
                        <p id="res-max" class="text-emerald-400 text-2xl font-black">0.00</p>
                    </div>
                </div>
            </div>

            <div id="history-panel" class="hidden mt-6 p-4 bg-black/50 border border-gray-800 rounded-2xl text-[10px] font-mono">
                <div id="history-list" class="space-y-2 text-gray-500">
                    <p class="text-center italic">Tsy mbola misy tantara...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let logs = [];

        function calculate() {
            const tIn = document.getElementById('tour').value;
            const mult = parseFloat(document.getElementById('mult').value) || 1.00;
            const decStr = document.getElementById('dec').value || "0";
            const cons = 4294967295;

            if (!tIn) return alert("Ampidiro aloha ny N° de tour farany!");

            // --- ALGORITHM V8 (LONG RANGE) ---
            
            // 1. ELANELANA (JUMP) : 5 hatramin'ny 8 tours
            // Miankina amin'ny isa farany amin'ny decimal
            let lastDigit = parseInt(decStr.slice(-1)) || 5;
            let jump = 5 + (lastDigit % 4); // Manome 5, 6, 7, na 8
            const targetT = parseInt(tIn) + jump;

            // 2. KAJY COTE (PROVABLY FAIR LOGIC)
            // Mampiasa ny "Constant" zaraina amin'ny sisa amin'ny Hash
            let seed = parseInt(decStr.slice(-6)) || 123456;
            let hashValue = (cons / (seed + 1)) * (mult / 1.2);
            
            // Fandrindrana ny Côte Moyen (eo amin'ny 2.10 - 5.00)
            let cMoy = 2.10 + (hashValue % 3.0);
            
            // Fandrindrana ny Côte Max (Long range matetika misy cote ambony)
            let cMax = (cMoy * 2.5) + (lastDigit * 1.5);

            // Limiters (Mba tsy hisy valiny adala)
            if (cMoy < 1.8) cMoy = 2.42;
            if (cMax < 5) cMax = 11.85;

            // --- UI UPDATE ---
            document.getElementById('res-tour').innerText = targetT;
            document.getElementById('res-gap').innerText = `Mielanelana +${jump} lalao (Safe)`;
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);

            // --- LOGS ---
            logs.unshift(`T${targetT} | Moy: ${cMoy.toFixed(2)} | Max: ${cMax.toFixed(2)}`);
            updateHistoryUI();
        }

        function toggleHistory() { document.getElementById('history-panel').classList.toggle('hidden'); }
        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = logs.slice(0, 5).map(l => `<div class="border-b border-white/5 pb-1">> ${l}</div>`).join('');
        }
    </script>
</body>
</html>
