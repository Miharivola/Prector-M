<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECISION ELITE V16</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffcc00; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; text-transform: uppercase; }
        #header { width: 100%; background: #000; border-bottom: 3px solid var(--neon); padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 25px var(--neon); }
        #clock { font-size: 50px; font-weight: 900; color: var(--neon); font-family: monospace; }
        .wrapper { width: 92%; max-width: 400px; margin-top: 20px; }
        .card { background: #0a0a0a; border-radius: 30px; border: 1px solid #222; padding: 30px; text-align: center; position: relative; }
        .loader { width: 0%; height: 5px; background: var(--neon); position: absolute; top: 0; left: 0; transition: 0.1s; }
        .page { display: none; }
        .active { display: block; }
        h1 { color: var(--gold); font-size: 22px; letter-spacing: 3px; margin-bottom: 25px; font-weight: 900; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; background: linear-gradient(135deg, var(--gold), #b8860b); border: none; border-radius: 15px; font-weight: 900; font-size: 16px; color: #000; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        input { width: 100%; padding: 18px; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; text-align: center; font-size: 20px; box-sizing: border-box; margin-top: 5px; outline: none; }
        input:focus { border-color: var(--neon); }
        .res-display { background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 25px 15px; margin: 20px 0; }
        .res-time { font-size: 55px; font-weight: 900; color: #fff; }
        .stat-row { display: flex; justify-content: space-around; margin-top: 15px; padding-top: 15px; border-top: 1px solid #1a1a1a; }
        .history { width: 100%; margin-top: 30px; }
        .hist-item { background: #080808; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-left: 5px solid var(--neon); }
    </style>
</head>
<body>
    <div id="header"><div id="clock">00:00:00</div></div>
    <div class="wrapper">
        <div class="card">
            <div id="loader" class="loader"></div>
            <div id="p1" class="page active">
                <h1>ELITE PRECISION</h1>
                <button class="btn" onclick="go(2, '🚀 AVIATOR')">🚀 AVIATOR</button>
                <button class="btn" style="background: #a020f0; color:white;" onclick="go(2, '🌌 COSMOSX')">🌌 COSMOSX</button>
            </div>
            <div id="p2" class="page">
                <h2 id="title" style="color:var(--neon); margin:0;">PRECISION SYNC</h2>
                <div style="text-align:left; margin-top:15px;"><label style="font-size:10px; color:#555;">LERA HISTORY (H:M:S)</label></div>
                <input type="text" id="time-in">
                <div style="text-align:left; margin-top:15px;"><label style="font-size:10px; color:#555;">HEX HASH (6 CHARS)</label></div>
                <input type="text" id="seed-in" placeholder="Ex: 99b1ec">
                <button class="btn" id="calc-btn" onclick="runPrecision()">🔥 ANALYSER AVEC PRÉCISION</button>
                <p onclick="go(1)" style="font-size:11px; color:#444; cursor:pointer; margin-top:15px;">← RETOUR</p>
            </div>
            <div id="p3" class="page">
                <div style="color:var(--neon); font-size:12px; font-weight:900;">✔ SIGNAL OPTIMISÉ</div>
                <div class="res-display">
                    <div class="res-time" id="res-t">00:00:00</div>
                    <div class="stat-row">
                        <div><span style="font-size:10px; color:#555;">TARGET</span><br><span style="color:var(--gold); font-size:24px; font-weight:900;" id="v-base">x0.00</span></div>
                        <div><span style="font-size:10px; color:#555;">PROBA</span><br><span style="color:#fff; font-size:24px; font-weight:900;" id="v-prob">98%</span></div>
                    </div>
                </div>
                <button class="btn" onclick="go(2)">RESCANNER</button>
            </div>
        </div>
        <div class="history" id="hist-list"></div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }
        setInterval(updateClock, 1000);
        function go(n, t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
            if(t) document.getElementById('title').innerText = t;
        }
        function runPrecision() {
            const btn = document.getElementById('calc-btn');
            const loader = document.getElementById('loader');
            btn.style.display = 'none';
            let p = 0;
            const iv = setInterval(() => {
                p += 5; loader.style.width = p + "%";
                if(p >= 100) { clearInterval(iv); precisionLogic(); }
            }, 50);
        }
        function precisionLogic() {
            const seed = document.getElementById('seed-in').value || "99b1ec";
            const timeVal = document.getElementById('time-in').value;
            let hash = 0;
            for(let i=0; i<seed.length; i++) hash += seed.charCodeAt(i) * (i + 7);
            
            let t = timeVal.split(':');
            let d = new Date();
            d.setHours(t[0], t[1], t[2]);
            
            // --- NEW PRECISION OFFSET ---
            // Manampy 2-5 minitra arakaraka ny algorithm vaovao
            let addMin = (hash % 4) + 2;
            let addSec = (hash * 13) % 60;
            d.setMinutes(d.getMinutes() + addMin);
            d.setSeconds(addSec);

            const fTime = d.toTimeString().split(' ')[0];
            const fCote = 'x' + (1.7 + (hash % 15) / 10).toFixed(2);

            document.getElementById('res-t').innerText = fTime;
            document.getElementById('v-base').innerText = fCote;
            document.getElementById('v-prob').innerText = (90 + (hash % 9)) + "%";

            const hList = document.getElementById('hist-list');
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<b>🕒 ${fTime}</b><span style="color:var(--gold); font-weight:900;">${fCote}</span>`;
            hList.prepend(item);

            document.getElementById('calc-btn').style.display = 'block';
            go(3);
        }
        window.onload = () => { document.getElementById('time-in').value = new Date().toTimeString().split(' ')[0]; updateClock(); };
    </script>
</body>
</html>
