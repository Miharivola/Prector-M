<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor VIP V6 - Big Clock</title>
    <style>
        body { background: #000; color: #d4af37; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-transform: uppercase; overflow: hidden; }
        
        /* LERA NGEZA BE SY MANAITRA */
        #floating-clock { 
            position: fixed; 
            top: 10px; 
            left: 50%;
            transform: translateX(-50%); /* Napetraka eo afovoany ambony */
            background: rgba(0, 0, 0, 0.9); 
            border: 3px solid #00ff00; /* Maitso fluo */
            padding: 10px 25px; 
            border-radius: 15px; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            font-size: 32px; /* Natao ngeza be */
            font-weight: 900;
            z-index: 1000; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .container { width: 92%; max-width: 360px; background: #111; padding: 25px; border-radius: 25px; border: 1px solid #222; position: relative; margin-top: 60px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .lion-icon { font-size: 50px; margin-bottom: 5px; filter: drop-shadow(0 0 10px #f1c40f); }
        h1 { font-size: 18px; color: #f1c40f; margin-bottom: 15px; }

        .btn { display: block; width: 100%; padding: 18px; margin: 12px 0; background: linear-gradient(180deg, #f1c40f 0%, #d4af37 100%); border: none; border-radius: 12px; font-weight: 900; font-size: 16px; color: #000; cursor: pointer; }
        
        input { width: 100%; padding: 14px; margin-top: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; box-sizing: border-box; font-size: 18px; font-weight: bold; }
        label { font-size: 10px; color: #f1c40f; display: block; text-align: left; }

        .result-card { border: 2px solid #00ff00; padding: 20px; border-radius: 20px; margin-top: 15px; background: rgba(0,0,0,0.8); }
        .timer-val { font-size: 45px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; font-weight: bold; }
        .val-gold { color: #f1c40f; font-size: 24px; }
    </style>
</head>
<body>

    <div id="floating-clock">00:00:00</div>

    <div class="container">
        <div id="p1" class="page active">
            <div class="lion-icon">🦁</div>
            <h1>KING PREDICTOR VIP</h1>
            <button class="btn" onclick="go(2, 'AVIATOR')">🚀 AVIATOR</button>
            <button class="btn" onclick="go(2, 'JETX')">🚀 JETX</button>
            <button class="btn" onclick="go(2, 'COSMOSX')">🚀 COSMOSX</button>
        </div>

        <div id="p2" class="page">
            <h1 id="title">PREDICTION</h1>
            <div style="margin-bottom:10px;">
                <label>HEURE DE DÉPART</label>
                <input type="text" id="time-in">
            </div>
            <div style="margin-bottom:15px;">
                <label>SEED (6 CARACT)</label>
                <input type="text" id="seed-in" placeholder="Ex: B2C5E1">
            </div>
            <button class="btn" id="calc-btn" onclick="calc()">🔥 DÉCODER L'ALGO</button>
            <div id="loading" style="display:none; color:#00ff00; margin:15px;">CHARGEMENT DU SIGNAL...</div>
            <p onclick="go(1)" style="font-size:11px; color:#444; cursor:pointer;">← RETOUR</p>
        </div>

        <div id="p3" class="page">
            <div style="color:#00ff00; font-weight:bold; margin-bottom:5px;">✔ SIGNAL IDENTIFIÉ</div>
            <div class="result-card">
                <div class="timer-val" id="res-t">00:00:00</div>
                <div class="row"><span>CIBLE :</span><span class="val-gold" id="v-base">x0.00</span></div>
                <div class="row"><span>SÉCU :</span><span style="color:#fff; font-size:24px;" id="v-secu">x0.00</span></div>
                <div class="row" style="border-top:1px solid #222; padding-top:10px; margin-top:15px;">
                    <span style="color:#ff4757;">RISQUE :</span><span style="color:#ff4757; font-size:24px;" id="v-risk">x0.00</span>
                </div>
            </div>
            <button class="btn" style="margin-top:20px;" onclick="go(2)">NOUVELLE ANALYSE</button>
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('floating-clock').innerText = h + ":" + m + ":" + s;
        }
        setInterval(update, 1000);

        function go(n, t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
            if(t) document.getElementById('title').innerText = t;
        }

        function calc() {
            const seed = document.getElementById('seed-in').value || "777";
            const timeVal = document.getElementById('time-in').value;
            document.getElementById('calc-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            setTimeout(() => {
                let seedVal = 0;
                for(let i=0; i<seed.length; i++) seedVal += seed.charCodeAt(i);
                
                let p = timeVal.split(':');
                let d = new Date();
                d.setHours(p[0], p[1], p[2]);
                d.setMinutes(d.getMinutes() + (seedVal % 3) + 1);
                d.setSeconds((seedVal * 7) % 60);

                document.getElementById('res-t').innerText = d.toTimeString().split(' ')[0];
                document.getElementById('v-base').innerText = 'x' + (1.6 + (seedVal % 12)/10).toFixed(2);
                document.getElementById('v-secu').innerText = 'x' + (3.2 + (seedVal % 18)/5).toFixed(2);
                document.getElementById('v-risk').innerText = 'x' + (12 + (seedVal % 45)).toFixed(2);

                document.getElementById('calc-btn').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                go(3);
            }, 2500);
        }

        window.onload = () => {
            document.getElementById('time-in').value = new Date().toTimeString().split(' ')[0];
            update();
        };
    </script>
</body>
</html>
