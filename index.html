<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Pro Dynamic</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #d4af37;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #151515;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .page { display: none; }
        .active { display: block; }

        h1 { font-size: 20px; margin-bottom: 20px; color: #f1c40f; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: #b8860b; font-size: 11px; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(to bottom, #f1c40f, #d4af37);
            color: #000;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        /* VOKATRA STYLE */
        .result-box {
            background: rgba(20, 20, 20, 0.95);
            padding: 20px;
            border: 2px solid #d4af37;
            border-radius: 15px;
            margin-top: 20px;
            position: relative;
        }

        /* Ny liona ao aoriana */
        .lion-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            opacity: 0.1;
            z-index: 0;
        }

        .result-content { position: relative; z-index: 1; }

        .timer-result {
            font-size: 38px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            margin-bottom: 15px;
        }

        .prediction-line {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
            font-weight: bold;
        }

        .val-base { color: #f1c40f; font-size: 20px; }
        .val-secu { color: #fff; font-size: 20px; }
        .val-risque { color: #ff4d4d; font-size: 20px; }

        .back-btn { margin-top: 20px; color: #555; cursor: pointer; font-size: 11px; }

        /* Animation kely rehefa miandry */
        #loading-text { display: none; color: #fff; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="page1" class="container page active">
        <h1>💛 LAST PREDICTOR 💛</h1>
        <button class="btn" onclick="goToPage('page2')">🚀 AVIATOR</button>
        <button class="btn">🚀 JETX</button>
        <button class="btn">🚀 COSMOSX</button>
    </div>

    <div id="page2" class="container page">
        <h1>PRÉDICTION AVIATOR</h1>
        <div class="input-group">
            <label>HEURE DE DÉPART</label>
            <input type="text" id="time-in" placeholder="00:00:00">
        </div>
        <div class="input-group">
            <label>GRAINE DE SERVEUR</label>
            <input type="text" id="seed-in" placeholder="Ex: 403245">
        </div>
        
        <button class="btn" id="predict-btn" onclick="processPrediction()">🚀 PREDICTOR 🖤</button>
        <div id="loading-text">Analyse du serveur...</div>
        
        <div class="back-btn" onclick="goToPage('page1')">← Retour</div>
    </div>

    <div id="page3" class="container page">
        <div style="color: #2ecc71; font-weight: bold; margin-bottom: 10px; font-size: 12px;">■ PRÉDICTION GÉNÉRÉE</div>
        
        <div class="result-box">
            <img src="https://img.freepik.com/premium-vector/lion-head-shield-heraldic-logo_214532-13.jpg" class="lion-bg">
            <div class="result-content">
                <div class="timer-result" id="res-time">00:00:00</div>
                
                <div class="prediction-line">
                    <span>🤍 BASE :</span>
                    <span class="val-base" id="val-base">x1.00</span>
                </div>
                
                <div class="prediction-line">
                    <span>🤍 SÉCURITÉ :</span>
                    <span class="val-secu" id="val-secu">x1.00</span>
                </div>
                
                <div class="prediction-line" style="border-top: 1px solid #333; padding-top: 10px;">
                    <span>💜 RISQUE :</span>
                    <span class="val-risque" id="val-risque">x1.00</span>
                </div>
            </div>
        </div>

        <div class="back-btn" onclick="goToPage('page2')">← Nouveau Calcul</div>
    </div>

    <script>
        function goToPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // Ity ny fomba fikajiana ireo isa kisendrasendra
        function getRandomMultiplier(min, max) {
            return (Math.random() * (max - min) + min).toFixed(2);
        }

        function processPrediction() {
            const timeIn = document.getElementById('time-in').value;
            if(!timeIn) { alert("Ampidiro ny ora!"); return; }

            // Mampiseho "loading" kely
            document.getElementById('predict-btn').style.display = 'none';
            document.getElementById('loading-text').style.display = 'block';

            setTimeout(() => {
                // Ovaina ny ora (segondra vitsy aorian'ny ora nampidirina)
                document.getElementById('res-time').innerText = timeIn;

                // Mamorona isa kisendrasendra (Random)
                document.getElementById('val-base').innerText = 'x' + getRandomMultiplier(1.5, 5.0);
                document.getElementById('val-secu').innerText = 'x' + getRandomMultiplier(5.5, 15.0);
                document.getElementById('val-risque').innerText = 'x' + getRandomMultiplier(20.0, 99.0);

                // Miverina amin'ny bokotra ary mandeha amin'ny pejy vokatra
                document.getElementById('predict-btn').style.display = 'block';
                document.getElementById('loading-text').style.display = 'none';
                goToPage('page3');
            }, 1500); // Miandry 1.5 segondra (simulation)
        }
    </script>

</body>
</html>
