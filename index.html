<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Predictor</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #444;
        }
        .logo {
            width: 150px;
            height: 150px;
            background: #333; /* Azonao ovaina sary liona eto */
            border-radius: 50%;
            margin-bottom: 20px;
            border: 5px solid #d32f2f;
        }
        .status-box {
            background: #333;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .prediction {
            font-size: 3rem;
            font-weight: bold;
            color: #ff5252;
            margin: 20px 0;
        }
        .btn-live {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
        }
        .btn-live:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>BOSS BET</h2>
        <p>AVIATOR PREDICTOR</p>
        
        <div class="logo">
            </div>

        <div class="status-box">
            <small>PROCHAINE PRÉDICTION</small>
            <div class="prediction" id="result">1.00x</div>
        </div>

        <button class="btn-live" onclick="generatePrediction()">🎯 SIGNAL LIVE</button>
    </div>

    <script>
        function generatePrediction() {
            // Maka isa kisendrasendra eo anelanelan'ny 1.00 sy 5.00
            const randomValue = (Math.random() * 4 + 1).toFixed(2);
            document.getElementById('result').innerText = randomValue + 'x';
        }
    </script>
</body>
</html>
