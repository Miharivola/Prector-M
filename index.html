<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Predict Pro - Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #05080f; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { 
            background: rgba(15, 23, 42, 0.95); 
            border: 1px solid rgba(234, 179, 8, 0.2); 
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            color: white; 
            text-align: center;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: #eab308; outline: none; background: #161e31; }
        .btn-calculate { 
            background: linear-gradient(90deg, #86efac 0%, #fde047 100%); 
            color: #000; 
            font-weight: 800;
            transition: transform 0.1s;
        }
        .btn-calculate:active { transform: scale(0.96); }
        .result-box { 
            border: 1px solid #1e293b; 
            border-radius: 16px; 
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 border-2 border-yellow-500 rotate-45 flex items-center justify-center shadow-[0_0_15px_rgba(234,179,8,0.3)]">
                    <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></div>
                </div>
                <div class="text-yellow-500 font-black text-xs leading-none uppercase tracking-tighter">
                    Blizzard-<br>Imperial
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="bg-cyan-500/10 text-cyan-400 px-3 py-1.5 rounded-xl border border-cyan-500/30 text-[11px] font-bold flex items-center gap-1.5">
                    <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Admin
                </div>
                <button class="text-gray-500 hover:text-white transition"><i data-lucide="history" class="w-5 h-5"></i></button>
                <button class="text-gray-500 hover:text-white transition"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div class="glass-card p-6 relative">
            <div class="flex justify-center mb-1 text-yellow-500/80">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
            </div>
            <h2 class="text-center text-lg font-bold mb-6 tracking-tight text-white/90">Calculateur de Prédiction</h2>

            <div class="space-y-4">
                <div class="relative">
                    <label class="text-[10px] text-cyan-400 uppercase font-black mb-1.5 ml-1 block">Heure de départ</label>
                    <input id="heure" type="text" class="w-full input-field p-4 rounded-2xl text-2xl font-mono" value="15:33:29">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <div class="relative">
                        <input id="mult" type="number" step="0.01" class="w-full input-field p-3 rounded-xl text-sm" placeholder="Multiplicateur (ex: 1.31)">
                    </div>
                    <div class="relative">
                        <input id="dec" type="number" class="w-full input-field p-3 rounded-xl text-sm" placeholder="Décimal (Max 10 digits)">
                    </div>
                    <div class="relative">
                        <input id="cons" type="number" class="w-full input-field p-3 rounded-xl text-sm font-semibold text-gray-400" value="4294967295">
                    </div>
                </div>

                <div class="flex gap-3 mt-6">
                    <button onclick="calculate()" class="flex-[2] btn-calculate py-4 rounded-2xl uppercase text-sm tracking-[0.1em] shadow-lg shadow-green-500/10">Calculer</button>
                    <button onclick="reset()" class="flex-1 bg-black/40 border border-white/5 py-4 rounded-2xl uppercase text-[10px] font-black text-gray-400 hover:bg-black/60 transition">Reset</button>
                </div>
            </div>

            <div class="mt-8">
                <div class="flex items-center gap-3 justify-center mb-5">
                    <div class="h-[1px] w-8 bg-gradient-to-r from-transparent to-cyan-500/40"></div>
                    <span class="text-[10px] text-cyan-400 font-black tracking-[0.3em] uppercase">Résultat</span>
                    <div class="h-[1px] w-8 bg-gradient-to-l from-transparent to-cyan-500/40"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="result-box p-4 text-center border-yellow-500/40 bg-yellow-500/5 col-span-2 ring-1 ring-yellow-500/10">
                        <p class="text-[9px] text-gray-500 font-black mb-1 uppercase tracking-widest">Prediction Final</p>
                        <p id="res-pred" class="text-yellow-500 text-3xl font-black drop-shadow-[0_0_10px_rgba(234,179,8,0.2)]">--:--:--</p>
                    </div>
                    
                    <div class="result-box p-3 text-center">
                        <p class="text-[9px] text-gray-500 font-bold mb-1">CÔTE BASE</p>
                        <p id="res-base" class="text-blue-400 text-xl font-black">0.00</p>
                    </div>

                    <div class="result-box p-3 text-center">
                        <p class="text-[9px] text-gray-500 font-bold mb-1">TEMPS +</p>
                        <p id="res-plus" class="text-white text-xl font-black">--:--</p>
                    </div>

                    <div class="result-box p-3 text-center">
                        <p class="text-[9px] text-gray-500 font-bold mb-1">COTE MOYEN</p>
                        <p id="res-moy" class="text-white text-xl font-black">0.00</p>
                    </div>

                    <div class="result-box p-3 text-center border-green-500/30 ring-1 ring-green-500/5">
                        <p class="text-[9px] text-gray-500 font-bold mb-1">COTE MAX</p>
                        <p id="res-max" class="text-green-400 text-xl font-black">0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        function calculate() {
            // Get Input Values
            const hInput = document.getElementById('heure').value;
            const mult = parseFloat(document.getElementById('mult').value) || 1.00;
            const decStr = document.getElementById('dec').value;
            const dec = parseFloat(decStr) || 1.00;
            const cons = parseFloat(document.getElementById('cons').value) || 4294967295;

            // 1. Time Calculation (HH:mm:ss to Total Seconds)
            const parts = hInput.split(':');
            if (parts.length < 3) return alert("Hampidiro ny ora marina (HH:mm:ss)");
            const baseSec = (parseInt(parts[0]) * 3600) + (parseInt(parts[1]) * 60) + parseInt(parts[2]);

            // 2. Fix: Ensure 'addedSec' is never zero
            // We use the length and the value to generate a dynamic offset
            let seed = (dec % 999999) || (decStr.length * 12345);
            let addedSec = (cons / (seed * 1.5)) * (mult / 2);
            
            // Limit added time between 30s and 10 mins (600s)
            addedSec = Math.abs(addedSec % 600);
            if (addedSec < 45) addedSec = 45 + (mult * 5); 

            // 3. Generate Prediction Time
            const finalSec = baseSec + addedSec;
            const d = new Date(0); d.setSeconds(finalSec);
            const predTime = d.toISOString().substr(11, 8);

            // 4. Formatting 'Temps Rajouté' (mm:ss)
            const m = Math.floor(addedSec / 60);
            const s = Math.floor(addedSec % 60);
            const addedFormatted = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

            // 5. Odds Algorithm (Cotes)
            const cBase = 1.15 + (Math.sin(dec) * 0.5) + (mult * 0.1);
            const cMax = 5.00 + (dec % 45) + (mult * 1.5);
            const cMoy = (cBase + cMax) / 2.25;

            // 6. Update UI with Animation feel
            document.getElementById('res-pred').innerText = predTime;
            document.getElementById('res-plus').innerText = addedFormatted;
            document.getElementById('res-base').innerText = Math.abs(cBase).toFixed(2);
            document.getElementById('res-moy').innerText = Math.abs(cMoy).toFixed(2);
            document.getElementById('res-max').innerText = Math.abs(cMax).toFixed(2);
        }

        function reset() {
            document.getElementById('res-pred').innerText = "--:--:--";
            document.getElementById('res-plus').innerText = "--:--";
            document.getElementById('res-base').innerText = "0.00";
            document.getElementById('res-moy').innerText = "0.00";
            document.getElementById('res-max').innerText = "0.00";
        }
    </script>
</body>
    </html>
