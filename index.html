<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor VIP</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('images.jpeg');
            background-size: cover; background-position: center;
        }
        .container { width: 92%; max-width: 400px; text-align: center; }
        .page { display: none; } .active { display: block; }

        .title-gold { color: #f1c40f; font-size: 22px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        .input-card { background: #111; border-radius: 20px; padding: 25px; border: 1px solid #222; margin-bottom: 20px; }

        /* Style an'ilay Label kely eo ambonin'ny vata */
        .label { color: #d4af37; font-size: 11px; font-weight: bold; text-align: left; margin-bottom: 8px; text-transform: uppercase; }

        /* IREO VATA FAMPIDIRANA (INPUT) - IZAY NO TSY NANDEHA TEZAO */
        .entry-field {
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
            color: #fff; font-size: 20px; width: 100%; padding: 15px;
            text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box;
            display: block; /* Mba hampiseho azy tsara */
        }
        .entry-field:focus { border-color: #f1c40f; }

        .btn-predict { 
            background: linear-gradient(180deg, #f1c40f, #d4af37); border: none; border-radius: 12px; 
            color: #000; width: 100%; padding: 18px; font-weight: bold; font-size: 18px; 
            cursor: pointer; text-transform: uppercase;
        }

        #result-area { 
            display: none; border: 1px solid #f1c40f; border-radius: 20px; padding: 20px; 
            background: rgba(15, 15, 15, 0.95); margin-top: 15px;
        }

        .val-row { font-size: 19px; font-weight: bold; margin: 12px 0; }
        .base { color: #fff; } .secu { color: #2ecc71; } .risk { color: #9b59b6; }
        
        .back-link { color: #555; display: block; margin-top: 25px; text-decoration: none; font-size: 12px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #d4af37; margin-bottom: 15px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="container">
        <div id="page-menu" class="page active">
            <img src="images.jpeg" class="logo-img">
            <h2 style="color: #d4af37;">LAST PREDICTOR</h2>
            <button class="btn-predict" style="margin-bottom: 15px;" onclick="openPredictor('AVIATOR')">🚀 AVIATOR</button>
            <button class="btn-predict" style="margin-bottom: 15px;" onclick="openPredictor('COSMOSX')">🚀 COSMOSX</button>
            <button class="btn-predict" onclick="openPredictor('JETX')">🚀 JETX</button>
        </div>

        <div id="page-predict" class="page">
            <h2 class="title-gold">PRÉDICTION <span id="game-title"></span></h2>
            
            <div class="input-card">
                <div class="label">HEURE DE DÉPART</div>
                <input type="text" id="input-time" class="entry-field" placeholder="10:51:12">

                <div class="label">GRAINE DE SERVEUR (6 CARACT)</div>
                <input type="text" id="input-seed" class="entry-field" value="B2ce53" maxlength="10">

                <button class="btn-predict" onclick="generatePrediction()">🚀 PREDICTOR 🖤</button>
            </div>

            <div id="result-area">
                <div style="color: #2ecc71; font-size: 12px; font-weight: bold; margin-bottom: 10px;">■ PRÉDICTION VALIDE</div>
                <div id="res-hour" style="font-size: 32px; font-weight: bold; margin-bottom: 15px; color: #fff;">--:--:--</div>
                
                <div class="val-row base">🤍 BASE : <span id="v1">x0.00</span></div>
                <div class="val-row secu">💚 SÉCURITÉ : <span id="v2">x0.00</span></div>
                <div class="val-row risk">💜 RISQUE : <span id="v3">x0.00</span></div>
            </div>

            <a href="#" class="back-link" onclick="location.reload()">← RETOUR AU MENU</a>
        </div>
    </div>

    <script>
        function openPredictor(name) {
            document.getElementById('page-menu').classList.remove('active');
            document.getElementById('page-predict').classList.add('active');
            document.getElementById('game-title').innerText = name;
            
            // Rehefa misokatra dia fenoina lera mivantana ho fanampiana
            const now = new Date();
            document.getElementById('input-time').value = now.toLocaleTimeString('fr-FR', { hour12: false });
        }

        function generatePrediction() {
            const timeVal = document.getElementById('input-time').value;
            if(!timeVal) { alert("Ampidiro ny lera azafady!"); return; }

            document.getElementById('result-area').style.display = 'block';
            document.getElementById('res-hour').innerText = timeVal;

            // Vinany isa kisendrasendra
            document.getElementById('v1').innerText = "x" + (Math.random() * 1.5 + 1.1).toFixed(2);
            document.getElementById('v2').innerText = "x" + (Math.random() * 5 + 3).toFixed(2);
            document.getElementById('v3').innerText = "x" + (Math.random() * 20 + 10).toFixed(2);
        }
    </script>
</body>
</html>
