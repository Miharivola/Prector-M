<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Predictor VIP + Logo</title>
    <style>
        /* 1. ENDRIKA ANKAPOBENY */
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        /* LERA MITSINGEVANA */
        #floating-clock {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #d4af37;
            padding: 5px 12px;
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #111;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 15px 40px rgba(0,0,0,1);
            position: relative;
            overflow: hidden;
        }

        /* SARY LIONA AO AFARA (BACKGROUND) */
        .bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            opacity: 0.1; /* Ataontsika matsatso mba tsy hanelingelina soratra */
            z-index: 0;
            pointer-events: none;
        }

        .page { position: relative; z-index: 1; display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* LOGO KELY EO AMBONY */
        .top-logo {
            width: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 5px #f1c40f);
        }

        h1 { font-size: 20px; color: #f1c40f; margin-bottom: 5px; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            background: linear-gradient(180deg, #f1c40f 0%, #d4af37 100%);
            color: #000;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
            font-size: 16px;
        }

        .result-card {
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border: 2px solid #d4af37;
            border-radius: 20px;
            margin-top: 15px;
        }

        .timer-val { font-size: 40px; font-weight: 900; color: #fff; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; font-weight: bold; }
        .val-gold { color: #f1c40f; font-size: 20px; }
    </style>
</head>
<body>

    <div id="floating-clock">00:00:00</div>

    <div class="container">
        <img src="https://i.ibb.co/L6V6RzS/lion-logo.png" class="bg-logo" alt="logo">

        <div id="page1" class="page active">
            <img src="https://i.ibb.co/L6V6RzS/lion-logo.png" class="top-logo" alt="logo">
            <h1>💛 LAST PREDICTOR 💛</h1>
            <p style="font-size: 10px; color: #666;">ALGORITHM V4.0 VIP</p>
            <button class="btn" onclick="showPage('page2', 'AVIATOR')">🚀 AVIATOR</button>
            <button class="btn" onclick="showPage('page2', 'JETX')">🚀 JETX</button>
            <button class="btn" onclick="showPage('page2', 'COSMOSX')">🚀 COSMOSX</button>
        </div>

        <div id="page2" class="page">
            <h1 id="game-name">PRÉDICTION</h1>
            <div style="text-align:left; margin-bottom:15px;">
                <label style="font-size:10px; color:#b8860b;">HEURE DE DÉPART</label>
                <input type="text" id="input-time">
            </div>
            <div style="text-align:left; margin-bottom:15px;">
                <label style="font-size:10px; color:#b8860b;">GRAINE (6 CARACT)</label>
                <input type="text" id="input-seed" value="B2CE53">
            </div>
            <button class="btn" id="btn-calc" onclick="startCalculating()">🚀 ANALYSER</button>
            <div id="loader" style="display:none; color:#fff; font-size:12px; margin:15px 0;">Analyse en cours...</div>
            <p style="font-size:11px; color:#444; cursor:pointer;" onclick="showPage('page1')">← RETOUR</p>
        </div>

        <div id="page3" class="page">
            <div style="color: #2ecc71; font-weight: bold; font-size: 11px;">■ ANALYSE TERMINÉE</div>
            <div class="result-card">
                <div class="timer-val" id="res-time">00:00:00</div>
                <div class="row"><span>BASE :</span><span class="val-gold" id="val-base">x0.00</span></div>
                <div class="row"><span>SÉCURITÉ :</span><span style="color:#fff; font-size:20px;" id="val-secu">x0.00</span></div>
                <div class="row" style="border-top: 1px solid #333; padding-top:10px;">
                    <span style="color:#ff4757;">RISQUE :</span><span style="color:#ff4757; font-size:20px;" id="val-risque">x0.00</span>
                </div>
            </div>
            <button class="btn" style="margin-top:15px;" onclick="showPage('page2')">NOUVEAU CALCUL</button>
        </div>
    </div>

    <script>
        function updateClock() {
            let now = new Date();
            document.getElementById('floating-clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showPage(pageId, title = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(title) document.getElementById('game-name').innerText = "PRÉDICTION " + title;
        }

        function startCalculating() {
            const timeVal = document.getElementById('input-time').value;
            document.getElementById('btn-calc').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                let parts = timeVal.split(':');
                let d = new Date();
                d.setHours(parts[0], parts[1], parts[2]);
                d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 4) + 1);
                d.setSeconds(Math.floor(Math.random() * 59));

                document.getElementById('res-time').innerText = d.toTimeString().split(' ')[0];
                document.getElementById('val-base').innerText = 'x' + (Math.random() * 2 + 1.2).toFixed(2);
                document.getElementById('val-secu').innerText = 'x' + (Math.random() * 5 + 4).toFixed(2);
                document.getElementById('val-risque').innerText = 'x' + (Math.random() * 30 + 10).toFixed(2);
                
                document.getElementById('btn-calc').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                showPage('page3');
            }, 2000);
        }

        window.onload = function() {
            document.getElementById('input-time').value = new Date().toTimeString().split(' ')[0];
        };
    </script>
</body>
</html>
