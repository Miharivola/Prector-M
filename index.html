<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor App</title>
    <style>
        /* Ity no mamaritra ny loko sy ny endriny (Design) */
        body {
            background-color: #121212; /* Loko mainty antitra */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #FFD700; /* Loko volamena */
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* Ny endriky ny bokotra */
        .btn {
            background: linear-gradient(180deg, #E6B800 0%, #B8860B 100%);
            border: none;
            border-radius: 15px;
            color: #000000;
            width: 100%;
            padding: 20px;
            margin: 12px 0;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98); /* Mihetsika kely rehefa tsindriana */
        }

        .emoji {
            margin-right: 15px;
            font-size: 22px;
        }

        footer {
            margin-top: 50px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💛 LAST PREDICTOR 💛</h1>
        <p class="subtitle">Choisissez votre jeu de prédiction</p>

        <div class="btn">
            <span class="emoji">🚀</span> AVIATOR
        </div>

        <div class="btn">
            <span class="emoji">🚀</span> JETX
        </div>

        <div class="btn">
            <span class="emoji">🚀</span> COSMOSX
        </div>

        <footer>← Retour au menu</footer>
    </div>

</body>
</html>
