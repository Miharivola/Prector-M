<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blizzard-Imperial Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #05080f; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { 
            background: rgba(15, 23, 42, 0.9); 
            border: 1px solid rgba(234, 179, 8, 0.2); 
            border-radius: 24px;
        }
        .input-field { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            color: white; 
            text-align: center;
        }
        .btn-calc { 
            background: linear-gradient(90deg, #86efac, #fde047); 
            color: #000; 
            font-weight: 800;
        }
        .result-box { 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border-2 border-yellow-500 rotate-45 flex items-center justify-center">
                    <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></div>
                </div>
                <div class="text-yellow-500 font-bold text-[10px] leading-none uppercase">
                    Blizzard-<br>Imperial
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="bg-cyan-500/10 text-cyan-400 px-3 py-1.5 rounded-lg border border-cyan-500/30 text-[11px] font-bold flex items-center gap-1">
                    <i data-lucide="shield-check" class="w-3 h-3"></i> Admin
                </div>
                <button onclick="showHistory()" class="p-1.5 text-gray-400 hover:text-white transition">
                    <i data-lucide="history" class="w-5 h-5"></i>
                </button>
                <button class="p-1.5 text-gray-400 hover:text-white transition">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="glass-card p-6 shadow-2xl">
            <div class="flex justify-center mb-1 text-yellow-500/50">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
            </div>
            <h2 class="text-center text-lg font-bold mb-6">Calculateur de Prédiction</h2>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-400 uppercase font-bold mb-1 block">Heure de départ</label>
                    <input id="heure" type="text" class="w-full input-field p-3 rounded-xl text-xl font-mono" value="15:54:18">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <input id="mult" type="number" step="0.01" class="w-full input-field p-2 rounded-lg text-sm" placeholder="Multiplicateur (ex: 3.35)">
                    <input id="dec" type="number" class="w-full input-field p-2 rounded-lg text-sm" placeholder="Décimal (ex: 1240839523)">
                    <input id="cons" type="number" class="w-full input-field p-2 rounded-lg text-sm text-gray-500" value="4294967295">
                </div>

                <div class="flex gap-3 mt-4">
                    <button onclick="calculate()" class="flex-[2] btn-calc py-4 rounded-xl uppercase text-sm tracking-widest active:scale-95 transition">Calculer</button>
                    <button onclick="resetAll()" class="flex-1 bg-black/40 border border-white/10 py-4 rounded-xl uppercase text-[10px] font-bold">Reset</button>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-2 gap-3">
                <div class="result-box p-4 text-center border-yellow-500/40 bg-yellow-500/5 col-span-2">
                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase tracking-widest">Prediction Final</p>
                    <p id="res-pred" class="text-yellow-500 text-3xl font-black">--:--:--</p>
                </div>
                
                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Côte Base</p>
                    <p id="res-base" class="text-blue-400 text-xl font-bold">0.00</p>
                </div>

                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Temps +</p>
                    <p id="res-plus" class="text-white text-xl font-bold">00:00</p>
                </div>

                <div class="result-box p-3 text-center">
                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Cote Moyen</p>
                    <p id="res-moy" class="text-white text-xl font-bold">0.00</p>
                </div>

                <div class="result-box p-3 text-center border-green-500/30">
                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Cote Max</p>
                    <p id="res-max" class="text-green-400 text-xl font-bold">0.00</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let historyData = [];

        function calculate() {
            const hInput = document.getElementById('heure').value;
            const mult = parseFloat(document.getElementById('mult').value) || 1.00;
            const dec = parseFloat(document.getElementById('dec').value) || 1.00;
            const cons = parseFloat(document.getElementById('cons').value) || 4294967295;

            const parts = hInput.split(':');
            const baseSec = (parseInt(parts[0]) * 3600) + (parseInt(parts[1]) * 60) + parseInt(parts[2]);

            // Fix Algorithm: Ensure no zero result
            let seed = (dec % 1000000) || 55555;
            let addedSec = (cons / (seed * 2)) * (mult / 1.5);
            addedSec = Math.abs(addedSec % 600); 
            if (addedSec < 30) addedSec = 150 + (mult * 10); 

            const finalSec = baseSec + addedSec;
            const d = new Date(0); d.setSeconds(finalSec);
            const predTime = d.toISOString().substr(11, 8);

            const m = Math.floor(addedSec / 60);
            const s = Math.floor(addedSec % 60);
            const addedFormatted = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

            // Odds Logic
            const cBase = 1.10 + (Math.sqrt(addedSec) / 15);
            const cMax = 5.00 + (addedSec % 40) + (mult / 2);
            const cMoy = (cBase + cMax) / 2.2;

            // Display
            document.getElementById('res-pred').innerText = predTime;
            document.getElementById('res-plus').innerText = addedFormatted;
            document.getElementById('res-base').innerText = cBase.toFixed(2);
            document.getElementById('res-moy').innerText = cMoy.toFixed(2);
            document.getElementById('res-max').innerText = cMax.toFixed(2);

            // Save to History
            historyData.unshift({ time: predTime, odds: cMax.toFixed(2) });
        }

        function showHistory() {
            if(historyData.length === 0) return alert("Tsy mbola misy tantara voatahiry.");
            let txt = "Tantara farany:\n" + historyData.slice(0, 5).map(h => `- ${h.time} (Cote: ${h.odds})`).join("\n");
            alert(txt);
        }

        function resetAll() {
            document.getElementById('res-pred').innerText = "--:--:--";
            document.getElementById('res-plus').innerText = "00:00";
            document.getElementById('res-base').innerText = "0.00";
            document.getElementById('res-moy').innerText = "0.00";
            document.getElementById('res-max').innerText = "0.00";
        }
    </script>
</body>
</html>
