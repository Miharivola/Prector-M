<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX PREDICTOR VIP V12</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffcc00; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; text-transform: uppercase; }
        
        #header { width: 100%; background: #000; border-bottom: 2px solid var(--neon); padding: 10px 0; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 15px var(--neon); }
        #clock { font-size: 45px; font-weight: 900; color: var(--neon); font-family: 'Courier New', monospace; }

        .wrapper { width: 90%; max-width: 400px; margin-top: 20px; }
        .main-card { background: #0a0a0a; border-radius: 25px; border: 1px solid #1a1a1a; padding: 25px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; }
        
        .progress-container { width: 100%; height: 5px; background: #111; margin-bottom: 20px; border-radius: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.1s; }

        .page { display: none; }
        .active { display: block; }

        h1 { color: var(--gold); font-size: 20px; letter-spacing: 3px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; background: linear-gradient(135deg, #ffcc00, #d4af37); border: none; border-radius: 15px; font-weight: 900; font-size: 16px; color: #000; cursor: pointer; }
        
        .input-box { text-align: left; margin-bottom: 15px; }
        label { font-size: 10px; color: #555; margin-left: 5px; }
        input { width: 100%; padding: 16px; background: #111; border: 1px solid #222; color: #fff; border-radius: 12px; text-align: center; font-size: 18px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon); }

        .res-display { background: #000; border: 1px solid #333; border-radius: 20px; padding: 20px; margin: 15px 0; border-left: 5px solid var(--neon); }
        .res-time { font-size: 45px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #111; }
        .gold-val { color: var(--gold); font-weight: 900; font-size: 20px; }

        .history-list { margin-top: 25px; width: 100%; }
        .hist-item { background: #080808; border: 1px solid #111; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-right: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div id="header"><div id="clock">00:00:00</div></div>

    <div class="wrapper">
        <div class="main-card">
            <div class="progress-container"><div id="bar"></div></div>

            <div id="p1" class="page active">
                <div style="font-size:50px; margin-bottom:10px;">🛡️</div>
                <h1>PRO MATRIX V12</h1>
                <button class="btn" onclick="go(2, 'AVIATOR')">ANALYSY AVIATOR</button>
                <button class="btn" onclick="go(2, 'JETX')">ANALYSY JETX</button>
                <p style="font-size:10px; color:#333;">ENCRYPTED BY KING_ALGO</p>
            </div>

            <div id="p2" class="page">
                <h2 id="title" style="color:var(--neon); margin:0;">SYSTEM SCAN</h2>
                <div class="input-box">
                    <label>LERA TAMIN'NY HISTORY (H:M:S)</label>
                    <input type="text" id="time-in">
                </div>
                <div class="input-box">
                    <label>SERVER HASH (6 CHARS)</label>
                    <input type="text" id="seed-in" placeholder="Ex: f4a1c2">
                </div>
                <button class="btn" id="calc-btn" onclick="runMatrix()">🚀 DECODER L'ALGO</button>
                <div id="status" style="display:none; color:var(--neon); font-size:12px;">CONVERTING HASH...</div>
                <p onclick="go(1)" style="font-size:11px; color:#444; cursor:pointer;">← MENU</p>
            </div>

            <div id="p3" class="page">
                <div style="color:var(--neon); font-size:11px; font-weight:bold;">✔ SIGNAL DECODED</div>
                <div class="res-display">
                    <div class="res-time" id="res-t">00:00:00</div>
                    <div class="stat-row"><span>TARGET</span><span class="gold-val" id="v-base">x0.00</span></div>
                    <div class="stat-row"><span>SÉCU</span><span style="font-weight:900;" id="v-secu">x0.00</span></div>
                </div>
                <button class="btn" onclick="go(2)">RESCANNER</button>
            </div>
        </div>

        <div class="history-list">
            <div style="font-size:10px; color:#444; margin-bottom:10px;">📜 LOGS DERNIERS SIGNALS</div>
            <div id="hist-content"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        function go(n, t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
            if(t) document.getElementById('title').innerText = t;
            document.getElementById('bar').style.width = "0%";
        }

        function runMatrix() {
            const btn = document.getElementById('calc-btn');
            const status = document.getElementById('status');
            const bar = document.getElementById('bar');
            
            btn.style.display = 'none';
            status.style.display = 'block';
            
            let p = 0;
            const iv = setInterval(() => {
                p += Math.random() * 15;
                bar.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    setTimeout(matrixLogic, 400);
                }
            }, 200);
        }

        function matrixLogic() {
            const seed = document.getElementById('seed-in').value || "pro123";
            const timeVal = document.getElementById('time-in').value;
            
            // --- ALGO PRO V12 (Sine Wave Logic) ---
            let seedSum = 0;
            for(let i=0; i<seed.length; i++) seedSum += seed.charCodeAt(i);
            
            let t = timeVal.split(':');
            let d = new Date();
            d.setHours(t[0], t[1], t[2]);
            
            // Elanelana fotoana miankina amin'ny hash
            let shift = (seedSum % 5) + 2; 
            d.setMinutes(d.getMinutes() + shift);
            d.setSeconds((seedSum * 3) % 60);

            // Kajy ny Cote (Calcul Sinusoidal)
            let baseCote = 1.6 + (Math.abs(Math.sin(seedSum)) * 2.5);
            let secuCote = baseCote * 0.7;

            const finalT = d.toTimeString().split(' ')[0];
            const finalC = 'x' + baseCote.toFixed(2);

            document.getElementById('res-t').innerText = finalT;
            document.getElementById('v-base').innerText = finalC;
            document.getElementById('v-secu').innerText = 'x' + secuCote.toFixed(2);

            // History Update
            const hList = document.getElementById('hist-content');
            const div = document.createElement('div');
            div.className = 'hist-item';
            div.innerHTML = `<span>🕒 ${finalT}</span><span style="color:#ffcc00; font-weight:900;">${finalC}</span>`;
            hList.prepend(div);

            document.getElementById('calc-btn').style.display = 'block';
            document.getElementById('status').style.display = 'none';
            go(3);
        }

        window.onload = () => {
            document.getElementById('time-in').value = new Date().toTimeString().split(' ')[0];
            updateClock();
        };
    </script>
</body>
</html>
